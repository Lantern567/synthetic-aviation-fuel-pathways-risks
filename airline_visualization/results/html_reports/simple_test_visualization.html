<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
    <title>pydeck</title>
        <script src="https://api.tiles.mapbox.com/mapbox-gl-js/v1.13.0/mapbox-gl.js"></script>
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.2.0/css/bootstrap-theme.min.css" />
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.6.3/css/font-awesome.min.css" />
    <script src='https://cdn.jsdelivr.net/npm/@deck.gl/jupyter-widget@~9.0.*/dist/index.js'></script>
    <style>
    body {
  margin: 0;
  padding: 0;
  overflow: hidden;
}

#deck-container {
  width: 100vw;
  height: 100vh;
}

#deck-container canvas {
  z-index: 1;
  background: none;
}
    </style>
  </head>
  <body>
    <div id="deck-container">
    </div>
  </body>
  <script>
    const container = document.getElementById('deck-container');
    const jsonInput = {
  "initialViewState": {
    "bearing": 0,
    "latitude": 32,
    "longitude": 118,
    "pitch": 0,
    "zoom": 4
  },
  "layers": [
    {
      "@@type": "ScatterplotLayer",
      "data": [
        {
          "city": "\u5317\u4eac",
          "lat": 39.9,
          "lon": 116.4,
          "value": 1000
        },
        {
          "city": "\u4e0a\u6d77",
          "lat": 31.2,
          "lon": 121.5,
          "value": 800
        },
        {
          "city": "\u5e7f\u5dde",
          "lat": 23.1,
          "lon": 113.3,
          "value": 600
        },
        {
          "city": "\u798f\u5dde",
          "lat": 26.1,
          "lon": 119.3,
          "value": 400
        }
      ],
      "getColor": [
        200,
        30,
        0,
        160
      ],
      "getPosition": "@@=[lon, lat]",
      "getRadius": 50000,
      "id": "22c79f1f-f041-4135-9dbb-0d7b0ae93e7b",
      "pickable": true
    }
  ],
  "mapProvider": "carto",
  "views": [
    {
      "@@type": "MapView",
      "controller": true
    }
  ]
};
    const tooltip = {'text': '城市: {city}\n数值: {value}'};
    const customLibraries = null;
    const configuration = null;

    const deckInstance = createDeck({
                  container,
      jsonInput,
      tooltip,
      customLibraries,
      configuration
    });

  </script>
</html>
