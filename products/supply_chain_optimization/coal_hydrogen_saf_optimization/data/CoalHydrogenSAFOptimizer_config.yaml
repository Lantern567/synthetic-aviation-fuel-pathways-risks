# =============================================================================
# 配置文件元数据 (Configuration Metadata)
# =============================================================================
metadata:
  version: 3.0.0                           # 配置文件版本 | Configuration version
  author: 系统自动生成                      # 作者 | Author
  created_date: '2025-10-27'               # 创建日期 | Creation date
  last_updated: '2025-10-27'               # 最后更新日期 | Last updated

  description: |
    CoalHydrogenSAFOptimizer综合参数配置文件
    Coal Hydrogen SAF Supply Chain Optimizer Comprehensive Configuration File

  notes: |
    配置文件说明:
    - 此配置文件包含了CoalHydrogenSAFOptimizer类的所有参数配置
    - 修改此文件可以调整优化器的行为，无需修改源代码
    - 参数分为15个主要类别，涵盖了经济、技术、成本、数据路径等各个方面
    - v2.0.0更新:
      * 从绿氢+外部CO₂捕获路线迁移到煤炭气化+绿氢路线
      * 添加煤炭供应参数配置(coal_parameters)
      * 移除CO₂外部捕获和运输配置（CO₂聚类、管道运输等）
      * 更新技术路线为煤炭气化CO₂+绿氢→SAF
    - v3.0.0更新（2025-10-28）:
      * 修正甲醇转化比例: methanol_intermediate_ratio 从 3.125 改为 1.5625
      * 统一电解制氢能耗: 所有位置统一为 55 kWh/kg H₂
      * 修正SAF反应器最小经济规模: 从 0 改为 100 kg/h
      * 修正储存设施成本: CAPEX从2000改为200000元, OPEX从30改为5000元/年
      * 修正平准化成本阈值: 从 1000 改为 50 元/kg
      * 优化求解器线程数: 从 128 改为 0 (自动检测)
      * 删除煤炭消耗参数重复定义，统一使用 coal_parameters.coal_consumption_kg_per_kg_saf
      * 添加煤炭气化能耗kWh单位，方便代码使用

    主要配置类别:
    1. basic_parameters: 基础系统参数（时间范围、路径规划）
    2. capacity_limits: 容量限制（设施产能、运输能力）
    3. co2_capture_parameters: CO₂捕获源参数（NEW）
    4. carbon_emission_parameters: 碳排放参数（全生命周期评估）
    5. clustering_parameters: 聚类参数（DBSCAN地理聚类）
    6. cost_parameters: 成本参数（氢气价格、运输成本）
    7. costs: 详细成本数据
    8. data_paths: 数据路径配置（输入输出文件路径）
    9. dependencies: 依赖关系说明（模块、库、数据依赖）
    10. economic_parameters: 经济参数（LCOE计算、贴现率）
    11. equipment_raw_costs: 设备原始成本（CAPEX/OPEX）
    12. facility_lcoe_parameters: 设施平准化成本参数
    13. geographic_data: 地理数据（机场坐标）
    14. objective_coefficients: 目标函数系数
    15. operational_parameters: 运营参数
    16. solver_parameters: Gurobi求解器参数
    17. technologies: 技术路线参数（绿氢+CO₂→SAF）
    18. transport_modes: 运输模式配置

# =============================================================================
# 目标函数系数 (Objective Coefficients)
# =============================================================================
objective_coefficients:
  final_inventory_disposal_cost_per_kg: 100
  storage:
    direct_costs:
      handling_cost_per_kg_hour: 0.001
      storage_density_kg_per_m3: 500
      warehouse_rent_per_m3_hour: 0.01
    equipment_unit_cost_yuan_per_kg: 10

# =============================================================================
# 运营参数 (Operational Parameters)
# =============================================================================
operational_parameters:
  default_transport_distances:
    h2_transport_distance_km: 100
    co2_transport_distance_km: 80
  operational_efficiency: 0.9

# =============================================================================
# 求解器参数 (Solver Parameters)
# Gurobi优化求解器的控制参数
# =============================================================================
solver_parameters:
  TimeLimit: 3600                          # 求解时间限制(秒) | Time limit (seconds)
                                           # 3600秒 = 1小时，超时后返回当前最优解
                                           # 调参建议：
                                           #   - 小规模问题: 600-1800秒
                                           #   - 中等规模: 3600-7200秒
                                           #   - 大规模问题: 7200-14400秒

  MIPGap: 0.01                             # 混合整数规划求解精度 | MIP optimality gap
                                           # 0.01 = 1%，允许解与最优解的相对差距
                                           # 较小的MIPGap提高精度但增加求解时间
                                           # 调参建议：
                                           #   - 高精度: 0.001-0.005
                                           #   - 平衡: 0.01-0.02
                                           #   - 快速: 0.05-0.1

  Threads: 128                               # 并行计算线程数 | Number of parallel threads
                                           # 统一修正：从0改为128，与其他项目保持一致
                                           # 128 = 使用最多128个线程进行并行计算
                                           # 建议：根据服务器CPU核心数调整
                                           # 注意：过多线程可能导致内存溢出和性能下降

# =============================================================================
# 技术路线参数 (Technology Parameters)
# 定义绿氢+CO₂制SAF技术路线和转换效率
# 技术类型: Green H₂ + CO₂ → SAF (Fischer-Tropsch synthesis)
# =============================================================================
technologies:
  # 绿氢+CO₂制SAF - Green Hydrogen + CO₂ to SAF
  green_h2_co2_to_saf:
    name: 绿氢+CO₂费托合成制SAF  # 技术名称 | Technology name
    technology_type: GreenH2_CO2_FT       # 技术类型 | Technology type
    transport_mode: renewable_h2_pipeline  # 运输模式：可再生能源电解制氢+管道 | Transport mode

    # ========================================================================
    # 🆕 工艺模式选择 - Process Mode Selection
    # ========================================================================
    process_mode: one_step                # 工艺模式：one_step (一步法)
                                          # H₂+CO₂→SAF (直接转化，无甲醇中间变量)
                                          # 注意：两步法已废弃，所有甲醇相关参数已删除

    # 适用位置 - Suitable Locations
    # 一步法可以在多种位置生产:
    # 1. 可再生能源站: 如果就地生产SAF,H₂无需运输,节省运输成本
    # 2. 机场/工业基地: 靠近需求点,减少SAF运输成本
    # 优化器会通过约束自动决定是否在各位置建设SAF工厂
    suitable_locations:                   # 可部署位置类型 | Deployable location types
    - solar_plant                         # 太阳能发电站（可选:就地制氢+制SAF）
    - wind_farm                           # 风电场（可选:就地制氢+制SAF）
    - airport                             # 机场附近（靠近需求点）
    - lng_terminal                        # LNG终端（工业基地）

    # 工艺参数 - Process Parameters
    efficiency: 0.60                      # 整体合成效率 | Overall synthesis efficiency
                                          # H₂+CO₂到SAF的碳转化效率60%

    # ========================================================================
    # ✅ 一步法直接转化参数（当前启用）
    # ========================================================================
    h2_consumption_ratio: 0.3             # 氢气消耗比(kg H₂/kg SAF) | H₂ consumption ratio
                                          # 一步法：生产1kg SAF需要0.3kg氢气
                                          # 直接从H₂和CO₂合成SAF，无甲醇中间步骤
                                          # 修正日期：2025-11-08 (煤炭气化路线参数)

    carbon_consumption_ratio: 1.0         # 碳消耗比(kg C/kg SAF) | Carbon consumption ratio
                                          # 一步法：生产1kg SAF需要1.0kg碳(C)
                                          # 注意：这里配置的是碳(C)不是CO₂，碳原子质量
                                          # CO₂中碳含量：C/CO₂ = 12/44 ≈ 0.273
                                          # 因此 1.0 kg C 对应约 3.67 kg CO₂
                                          # 修正日期：2025-11-08

    co2_emission_factor: -2.5             # CO₂排放系数(kg CO₂/kg SAF) | CO₂ emission factor
                                          # 负值表示净减排（使用捕获的CO₂）

    # 反应器参数 - Reactor Parameters
    reactor_temperature_celsius: 250      # 反应器温度(°C) | Reactor temperature

    reactor_pressure_mpa: 3.0             # 反应器压力(MPa) | Reactor pressure

    catalyst_type: Iron-based             # 催化剂类型 | Catalyst type
                                          # 铁基催化剂（适合CO₂加氢）

    catalyst_cost_yuan_per_kg_saf: 0.12   # 催化剂成本(元/kg SAF) | Catalyst cost per kg SAF

    # 能源消耗参数 - Energy Consumption Parameters
    energy_consumption_kwh_per_kg_saf: 7.6  # 电力消耗(kWh/kg SAF) | Electricity consumption
                                          # RWGS-FT e-kerosene合成段实际能耗
                                          # 包括RWGS反应、FT合成、压缩、泵送、分离等
                                          # 修正日期：2025-11-09 (从6.0更新为7.6)

    heat_integration_efficiency: 0.70     # 热集成效率 | Heat integration efficiency
                                          # 反应热的回收利用效率

    hydrogen_transport_required: true     # 是否需要氢气运输 | Hydrogen transport required
                                          # true: 需要从电解槽运输氢气到合成装置

  # 技术复杂度系数 - Technology Complexity Factors
  complexity_factors:
    green_h2_co2_to_saf: 1.2              # 绿氢+CO₂技术复杂度 | Green H₂+CO₂ complexity
                                          # 1.2表示比传统路线复杂20%

