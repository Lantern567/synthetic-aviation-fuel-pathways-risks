metadata:
  version: 1.1.0
  author: 系统自动生成
  created_date: '2025-01-09'
  last_updated: '2025-09-08'
  description: 'NaturalGasSupplyChainOptimizer综合参数配置文件

    Natural Gas Supply Chain Optimizer Comprehensive Configuration File

    '
  notes: '配置文件说明:

    - 此配置文件包含了NaturalGasSupplyChainOptimizer类的所有参数配置

    - 修改此文件可以调整优化器的行为，无需修改源代码

    - 参数分为18个主要类别，涵盖了经济、技术、成本、数据路径等各个方面

    - v1.1.0更新: 添加了数据路径配置section，支持pipeline式数据导入


    主要配置类别:

    1. basic_parameters: 基础系统参数（时间范围、路径规划）

    2. capacity_limits: 容量限制（设施产能、运输能力）

    3. carbon_emission_parameters: 碳排放参数（全生命周期评估）

    4. clustering_parameters: 聚类参数（DBSCAN地理聚类）

    5. cost_parameters: 成本参数（原材料价格、运输成本）

    6. costs: 详细成本数据（管道成本函数）

    7. data_paths: 数据路径配置（输入输出文件路径）

    8. dependencies: 依赖关系说明（模块、库、数据依赖）

    9. economic_parameters: 经济参数（LCOE计算、贴现率）

    10. equipment_raw_costs: 设备原始成本（CAPEX/OPEX）

    11. facility_lcoe_parameters: 设施平准化成本参数

    12. geographic_data: 地理数据（机场坐标）

    13. objective_coefficients: 目标函数系数

    14. operational_parameters: 运营参数

    15. solver_parameters: Gurobi求解器参数

    16. supply_capacity: 供应能力参数

    17. technologies: 技术路线参数（E-CRM+TRM）

    18. transport_modes: 运输模式配置

    19. unified_costs: 统一成本配置

    '
objective_coefficients:
  final_inventory_disposal_cost_per_kg: 100
  storage:
    direct_costs:
      handling_cost_per_kg_hour: 0.001
      storage_density_kg_per_m3: 500
      warehouse_rent_per_m3_hour: 0.01
    equipment_unit_cost_yuan_per_kg: 10
operational_parameters:
  default_transport_distances:
    ng_transport_distance_km: 80
  operational_efficiency: 0.9
solver_parameters:
  TimeLimit: 3600
  MIPGap: 0.01
  Threads: 192
supply_capacity:
  lng_terminal_capacity:
    default_capacity_mcm_per_year: 300
  natural_gas_supply:
    default_daily_volume_m3: 10000
    default_max_flow_m3_per_hour: 10000
    default_reduced_flow_m3_per_hour: 4000
    airport_max_flow_m3_per_hour: 5000
technologies:
  ft_direct_conversion:
    name: FT费托合成一步法SAF生产 (LTFT-Co催化)
    technology_type: FT_Direct
    transport_mode: ng_pipeline_direct
    suitable_locations:
    - ng_pipeline
    - lng_terminal
    - airport
    - industrial
    - petrochemical_base
    efficiency: 0.85
    ng_consumption_ratio: 1.9
    h2_consumption_ratio: 0
    co2_emission_factor: 0.8
    ft_reactor_temperature_celsius: 230
    ft_reactor_pressure_mpa: 2.5
    catalyst_type: Cobalt
    catalyst_cost_yuan_per_kg_saf: 0.06
    energy_consumption_kwh_per_kg_saf: 0.8
    heat_integration_efficiency: 0.75
    hydrogen_transport_required: false
  complexity_factors:
    ft_direct_conversion: 1.0
transport_constraints:
  ng_truck_transport:
    max_trucks_per_day: 20
    truck_capacity_m3: 1200
transport_modes:
  ng_pipeline_direct:
    capacity_factor: 0.95
    description: 天然气从管道直供到FT设施，就地合成SAF
    distance_limit_km: 1500
    name: 天然气管道直供
    suitable_sources:
    - ng_pipeline
  lng_terminal_supply:
    capacity_factor: 0.92
    description: 从LNG接收站直接供应天然气到FT设施
    distance_limit_km: 800
    name: LNG接收站供应
    suitable_sources:
    - lng_terminal
  airport_integrated:
    capacity_factor: 0.9
    cost_yuan_per_mcm_km: 5.0
    description: 在机场就近建设FT生产设施，天然气多种来源供应
    distance_limit_km: 500
    name: 机场集成
    suitable_sources:
    - ng_pipeline
    - lng_terminal
unified_costs:
  production:
    natural_gas_processing_cost_yuan_per_m3: 0.1
  raw_materials:
    natural_gas_base_price_yuan_per_m3: 4.2
  storage:
    facility_investment_yuan_per_kg: 1500
    facility_operation_yuan_per_kg_year: 20
    saf_equipment_cost_yuan_per_kg: 10
