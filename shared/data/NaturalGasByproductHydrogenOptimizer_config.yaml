basic_parameters:
  time_horizon_weeks: 4  # 使用4周典型数据
  periods_per_week: 56    # 每周决策期间数 (7天 × 8个3小时期间)
  hours_per_period: 3     # 每个决策期间的小时数
  use_graphhopper_routing: true
  graphhopper_host: localhost
  graphhopper_port: 8989
  max_transport_distance_km: 1000.0
  use_routing_for_short_distance: true
  use_hydrogen_pipeline_distance: true
  use_super_graph_optimizer: true
  avg_lng_capacity_mcm_per_year: 1000
  cache_base_dir: shared/data/cache
  cache_expiry_hours: 168
capacity_limits:
  big_m_constant: 10000
  electrolyzer_max_capacity_kg_per_hour: 100000
  electrolyzer_min_capacity_kg_per_hour: 100
  hydrogen_pipeline_max_daily_capacity_kg: 50000
  hydrogen_truck_max_daily_capacity_kg: 10000
  mtj_max_capacity_kg_per_hour: 100000
  mtj_min_capacity_kg_per_hour: 0.01
  mtj_min_annual_production_kg: 100
  ft_reactor_max_capacity_kg_per_hour: 1000000
  ft_reactor_min_capacity_kg_per_hour: 0.01
  mtj_capacity_estimates:
    default: 1500
    renewable_energy: 1000
    industrial: 2000
    petrochemical_base: 5000
  ng_demand_estimates:
    default_daily_volume_m3: 10000
carbon_emission_parameters:
  benchmarks:
    traditional_jet_fuel: 89
    saf_energy_content: 43.15
    corsia_limit: 30
  calculation_control:
    enable_carbon_tracking: true
    include_facility_construction: true
    use_lifecycle_amortization: true
    save_carbon_csv: true
    carbon_log_level: INFO
    carbon_report_detail_level: 2
  facility_construction:
    electrolyzer_embodied: 800
    electrolyzer_lifetime: 20
    saf_facility_embodied: 150
    saf_facility_lifetime: 25
    storage_facility_embodied: 75
    storage_facility_lifetime: 30
  renewable_energy:
    wind_power_intensity: 0.7
    solar_power_intensity: 0.7
    grid_electricity_intensity: 0.6
  raw_materials:
    ng_extraction_intensity: 0.25
    ng_pipeline_transport: 0.01
  production_process:
    renewable_electricity: 0.02
    electrolysis_energy: 55
    green_h2_intensity: 1.1
    ng_process_emission: 0.8
    ng_to_methanol_rate: 1.2
    h2_addition_rate: 40
    mtj_process_energy: 4500
  storage_handling:
    h2_storage_energy: 0.5
    mtj_storage_energy: 5
    storage_loss_rate: 0.001
  transportation:
    ng_truck_intensity: 0.1
    h2_pipeline_intensity: 0.005
    h2_truck_intensity: 0.15
    mtj_truck_intensity: 0.12
    co2_pipeline_intensity: 0.01
    co2_truck_intensity: 0.08

  # ========== CO₂源配置和碳汇控制 (CO₂ Source Configuration and Carbon Sink Control) ==========
  co2_source_configuration:
    scenario_type: 'fossil_feedstock'             # 化石燃料原料场景（天然气重整副产CO₂）| Fossil feedstock scenario
    enable_co2_utilization_credit: false          # 不计算CO₂利用负排放 | Disable CO₂ utilization carbon credit
    utilization_credit_factor: 0.0                # 副产CO₂循环利用不算碳汇 | Byproduct CO₂ recycling is not carbon sink
    description: |
      CO₂来源：天然气重整副产CO₂（化石燃料碳转化）
      碳汇计算：副产CO₂循环利用不属于碳移除，不计入负排放
      Carbon sink: Byproduct CO₂ from natural gas reforming is not carbon removal

clustering_parameters:
  enable_clustering: true
  enable_pipeline_optimization: true
  enable_clustering_visualization: false
  export_clustering_results: true
  clustering_output_path: clustering_results.json
  eps_distance_km: 15.0  # 更精细的聚类策略
  min_samples: 2
  max_clusters: 50
  noise_plant_handling: direct_connection
  pipeline_weight: 0.3
  shared_pipeline_discount_factor: 0.65
  processing_cost_base: 10.0
cost_parameters:
  electrolysis:
    electrolysis_efficiency: 0.8
    electrolysis_power_consumption: 55
    formula_based_transport:
      vehicle_payload_kg: 25000
      trip_fixed_cost: 2000
      variable_cost_per_km: 15.0
      utilization_rate: 0.8
  renewable_energy:
    wind_power_price_yuan_per_kwh: 0.35
    solar_power_price_yuan_per_kwh: 0.4
    grid_electricity_price_yuan_per_kwh: 0.6
  raw_materials:
    natural_gas_price_yuan_per_m3: 4.2
    hydrogen_market_price_yuan_per_kg: 30
    renewable_electricity_cost_yuan_per_mwh: 350
  shortage_penalty_yuan_per_kg: 2500
costs:
  hydrogen_pipeline_costs:
    capex_yuan_per_km: 5000000
    transport_cost_function:
      function_type: piecewise_linear
      unit: yuan_per_kg_hydrogen_per_100km
      description: 基于图表33管道输送氢气成本曲线
      data_points:
      - - 25
        - 1.91
      - - 50
        - 1.04
      - - 100
        - 0.56
      - - 200
        - 0.3
      - - 300
        - 0.21
      - - 400
        - 0.16
      - - 500
        - 0.13
      notes: '成本函数已包含以下所有费用：

        - 管道建设投资摊销 (Pipeline construction amortization)

        - 压缩机站投资和运营 (Compressor station CAPEX & OPEX)

        - 管道维护和检测 (Pipeline maintenance & inspection)

        - 能耗成本（压缩机电力） (Energy cost for compression)

        - 人工和管理成本 (Labor & management)


        单位转换说明：

        - 配置单位：元/(kg氢气·百公里)

        - 计算公式：总成本 = 单位成本 × (运输距离km ÷ 100)

        - 最终单位：元/kg氢气

        - 与罐车运输单位保持一致

        '
