    name: E-CRM+TRM MTJ航煤生产（机场集成）
    technology_type: E-CRM+TRM
    transport_mode: airport_integrated
    suitable_locations:
    - airport
    efficiency: 0.85
    ng_consumption_ratio: 0.8
    h2_consumption_ratio: 0.05
    methanol_intermediate_ratio: 1.2
    catalyst_cost_yuan_per_kg_saf: 0.1
    hydrogen_transport_required: true
  complexity_factors:
    pipeline_direct_conversion: 1.0
    airport_integrated_conversion: 1.0
    lng_terminal_conversion: 1.0
    lng_to_hplant_conversion: 1.0
  lng_terminal_conversion:
    efficiency: 0.85
    h2_consumption_ratio: 0.05
    hydrogen_transport_required: true
    methanol_intermediate_ratio: 1.2
    catalyst_cost_yuan_per_kg_saf: 0.1
    name: E-CRM+TRM MTJ航煤生产（LNG接收站）
    ng_consumption_ratio: 0.8
    suitable_locations:
    - lng_terminal
    technology_type: E-CRM+TRM
    transport_mode: lng_port_supply
  lng_to_hplant_conversion:
    efficiency: 0.85
    h2_consumption_ratio: 0.05
    hydrogen_transport_required: false
    methanol_intermediate_ratio: 1.2
    catalyst_cost_yuan_per_kg_saf: 0.1
    name: E-CRM+TRM MTJ航煤生产（LNG转运+可再生能源站）
    ng_consumption_ratio: 0.8
    suitable_locations:
    - solar_plant
    - wind_farm
    - byproduct_hydrogen_steel
    - byproduct_hydrogen_refinery
    technology_type: E-CRM+TRM
    transport_mode: lng_transfer
  pipeline_direct_conversion:
    efficiency: 0.85
    h2_consumption_ratio: 0.05
    hydrogen_transport_required: false
