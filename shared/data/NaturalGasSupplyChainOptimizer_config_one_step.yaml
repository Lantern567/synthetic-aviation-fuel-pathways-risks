# =============================================================================
# 配置文件元数据 (Configuration Metadata)
# =============================================================================
metadata:
  version: 1.1.0                           # 配置文件版本 | Configuration version
  author: 系统自动生成                      # 作者 | Author
  created_date: '2025-01-09'               # 创建日期 | Creation date
  last_updated: '2025-09-08'               # 最后更新日期 | Last updated

  description: |
    NaturalGasSupplyChainOptimizer综合参数配置文件
    Natural Gas Supply Chain Optimizer Comprehensive Configuration File

  notes: |
    配置文件说明:
    - 此配置文件包含了NaturalGasSupplyChainOptimizer类的所有参数配置
    - 修改此文件可以调整优化器的行为，无需修改源代码
    - 参数分为18个主要类别，涵盖了经济、技术、成本、数据路径等各个方面
    - v1.1.0更新: 添加了数据路径配置section，支持pipeline式数据导入

    主要配置类别:
    1. basic_parameters: 基础系统参数（时间范围、路径规划）
    2. capacity_limits: 容量限制（设施产能、运输能力）
    3. carbon_emission_parameters: 碳排放参数（全生命周期评估）
    4. clustering_parameters: 聚类参数（DBSCAN地理聚类）
    5. cost_parameters: 成本参数（原材料价格、运输成本）
    6. costs: 详细成本数据（管道成本函数）
    7. data_paths: 数据路径配置（输入输出文件路径）
    8. dependencies: 依赖关系说明（模块、库、数据依赖）
    9. economic_parameters: 经济参数（LCOE计算、贴现率）
    10. equipment_raw_costs: 设备原始成本（CAPEX/OPEX）
    11. facility_lcoe_parameters: 设施平准化成本参数
    12. geographic_data: 地理数据（机场坐标）
    13. objective_coefficients: 目标函数系数
    14. operational_parameters: 运营参数
    15. solver_parameters: Gurobi求解器参数
    16. supply_capacity: 供应能力参数
    17. technologies: 技术路线参数（E-CRM+TRM）
    18. transport_modes: 运输模式配置
    19. unified_costs: 统一成本配置
objective_coefficients:
  final_inventory_disposal_cost_per_kg: 100
  storage:
    direct_costs:
      handling_cost_per_kg_hour: 0.001
      storage_density_kg_per_m3: 500
      warehouse_rent_per_m3_hour: 0.01
    equipment_unit_cost_yuan_per_kg: 10
operational_parameters:
  default_transport_distances:
    ng_transport_distance_km: 80
  operational_efficiency: 0.9

# =============================================================================
# 求解器参数 (Solver Parameters)
# Gurobi优化求解器的控制参数
# =============================================================================
solver_parameters:
  TimeLimit: 3600                          # 求解时间限制(秒) | Time limit (seconds)
                                           # 3600秒 = 1小时，超时后返回当前最优解
                                           # 调参建议：
                                           #   - 小规模问题: 600-1800秒
                                           #   - 中等规模: 3600-7200秒
                                           #   - 大规模问题: 7200-14400秒

  MIPGap: 0.01                             # 混合整数规划求解精度 | MIP optimality gap
                                           # 0.01 = 1%，允许解与最优解的相对差距
                                           # 较小的MIPGap提高精度但增加求解时间
                                           # 调参建议：
                                           #   - 高精度: 0.001-0.005
                                           #   - 平衡: 0.01-0.02
                                           #   - 快速: 0.05-0.1

  Threads: 128                             # 并行计算线程数 | Number of parallel threads
                                           # 使用128个线程进行并行计算
                                           # 建议设置为CPU核心数或稍多
                                           # 注意：过多线程可能导致内存溢出

# =============================================================================
# 供应能力参数 (Supply Capacity)
# 定义各类供应源的容量限制
# =============================================================================
supply_capacity:
  # LNG接收站容量 - LNG Terminal Capacity
  lng_terminal_capacity:
    default_capacity_mcm_per_year: 300     # LNG接收站默认年接收能力(万m³/年) | Default annual capacity (10k m³/year)
                                           # 当缺少实际数据时使用的默认值
                                           # 300万m³/年是中小型LNG接收站的典型规模

  # 天然气供应参数 - Natural Gas Supply Parameters
  natural_gas_supply:
    default_daily_volume_m3: 10000         # 默认日供应量(m³/天) | Default daily supply volume (m³/day)
                                           # 1万m³/天的基准供应能力

    default_max_flow_m3_per_hour: 10000    # 默认最大流量(m³/h) | Default max flow rate (m³/hour)
                                           # 管道/设施的小时峰值供应能力

    default_reduced_flow_m3_per_hour: 4000 # 默认降低流量(m³/h) | Default reduced flow rate (m³/hour)
                                           # 非峰值时段或受限情况下的供应能力

    airport_max_flow_m3_per_hour: 5000     # 机场天然气最大流量(m³/h) | Airport max NG flow (m³/hour)
                                           # 机场专用天然气供应管线的小时容量
# =============================================================================
# 技术路线参数 (Technology Parameters)
# 定义FT费托合成一步法SAF生产技术路线和转换效率
# 技术类型: FT Direct Conversion (天然气直接费托合成制SAF)
# =============================================================================
technologies:
  # FT费托合成一步法 - FT Direct Conversion
  ft_direct_conversion:
    name: FT费托合成一步法SAF生产 (LTFT-Co催化)  # 技术名称 | Technology name
    technology_type: FT_Direct            # 技术类型 | Technology type
    transport_mode: ng_pipeline_direct    # 运输模式：天然气管道直供 | Transport mode: NG pipeline direct

    # 适用位置 - Suitable Locations
    suitable_locations:                   # 可部署位置类型 | Deployable location types
    - ng_pipeline                         # 天然气管道端点
    - lng_terminal                        # LNG接收站
    - airport                             # 机场附近(有天然气供应)
    - industrial                          # 工业基地
    - petrochemical_base                  # 石化基地

    # 工艺参数 - Process Parameters
    efficiency: 0.55                      # FT合成效率 | FT synthesis efficiency
                                          # 天然气到SAF的整体碳转化效率55%
                                          # 基于低温费托合成(LTFT)技术参数

    ng_consumption_ratio: 2.0             # 天然气消耗比(m³/kg产品) | NG consumption ratio (m³/kg SAF product)
                                          # 生产1kg SAF需要2.0m³天然气
                                          # 包括合成气制备和FT合成全过程

    h2_consumption_ratio: 0               # 氢气消耗比(kg/kg产品) | H₂ consumption ratio (kg/kg product)
                                          # FT一步法不需要外部氢气供应（内部产氢）

    co2_emission_factor: 0.8              # CO₂排放系数(kg CO₂/kg SAF) | CO₂ emission factor
                                          # 不含碳捕获时的排放系数

    # FT反应器参数 - FT Reactor Parameters
    ft_reactor_temperature_celsius: 230   # FT反应器温度(°C) | FT reactor temperature
                                          # 低温费托合成(LTFT)典型操作温度

    ft_reactor_pressure_mpa: 2.5          # FT反应器压力(MPa) | FT reactor pressure
                                          # 2.5MPa操作压力

    catalyst_type: Cobalt                 # 催化剂类型 | Catalyst type
                                          # 钴基催化剂(适合LTFT长链烃合成)

    catalyst_cost_yuan_per_kg_saf: 0.06   # 催化剂成本(元/kg SAF) | Catalyst cost per kg SAF

    # 能源消耗参数 - Energy Consumption Parameters
    energy_consumption_kwh_per_kg_saf: 5.0  # 电力消耗(kWh/kg SAF) | Electricity consumption
                                          # 包括压缩机、泵、分离单元等

    heat_integration_efficiency: 0.75     # 热集成效率 | Heat integration efficiency
                                          # FT反应放热的回收利用效率

    hydrogen_transport_required: false    # 是否需要氢气运输 | Hydrogen transport required
                                          # false: FT工艺内部产氢,无需外部氢气

  # 技术复杂度系数 - Technology Complexity Factors
  complexity_factors:
    ft_direct_conversion: 1.0             # FT一步法技术复杂度 | FT direct conversion complexity
                                          # 1.0表示标准复杂度
transport_constraints:
  ng_truck_transport:
    max_trucks_per_day: 20
    truck_capacity_m3: 1200
transport_modes:
  ng_pipeline_direct:
    capacity_factor: 0.95
    description: 天然气从管道直供到FT设施，就地合成SAF
    distance_limit_km: 1500
    name: 天然气管道直供
