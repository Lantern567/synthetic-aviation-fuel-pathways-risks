# =============================================================================
# 经济参数 (Economic Parameters)
# 用于平准化成本(LCOE)计算和经济性评估
# =============================================================================
economic_parameters:
  # 项目经济参数 - Project Economics
  project_lifespan: 20                     # 项目生命周期(年) | Project lifespan (years)
                                           # 用于成本摊销和经济性评估的时间跨度

  discount_rate: 0.08                      # 贴现率 | Discount rate
                                           # 8%年贴现率，用于净现值(NPV)计算
                                           # 反映资金时间价值和投资风险

  levelized_cost_threshold_yuan_per_kg: 7  # 平准化成本阈值(元/kg) | LCOE threshold (yuan/kg)
                                           # 用于经济性边界约束
                                           # 超过此值的方案可能不经济

  # 设备寿命参数 - Equipment Lifetime
  electrolyzer_lifetime: 15                # 电解槽寿命(年) | Electrolyzer lifetime (years)
                                           # 碱性/PEM电解槽的典型使用寿命

  mtj_plant_lifetime: 20                   # MTJ工厂寿命(年) | MTJ plant lifetime (years)
                                           # 化工装置的设计使用寿命

  pipeline_lifetime: 30                    # 管道寿命(年) | Pipeline lifetime (years)
                                           # 管道基础设施的设计使用寿命

  storage_lifetime: 25                     # 储存设施寿命(年) | Storage facility lifetime (years)

  transport_vehicle_lifetime: 20           # 运输车辆寿命(年) | Transport vehicle lifetime (years)

  # 容量系数 - Capacity Factors (实际利用率)
  capacity_factors:
    electrolyzer_capacity_factor: 0.75     # 电解槽容量系数 | Electrolyzer capacity factor
                                           # 考虑维护、检修等因素的实际运行率
                                           # 75% = 年运行6570小时

    mtj_plant_capacity_factor: 0.85        # MTJ工厂容量系数 | MTJ plant capacity factor
                                           # 化工装置的典型年运行率

    pipeline_capacity_factor: 0.95         # 管道容量系数 | Pipeline capacity factor
                                           # 管道系统的高可用性

    storage_capacity_factor: 0.9           # 储存设施容量系数 | Storage facility capacity factor

    transport_capacity_factor: 0.75        # 运输系统容量系数 | Transport system capacity factor
                                           # 考虑天气、维护、调度等因素
# =============================================================================
# 设备原始成本 (Equipment Raw Costs)
# FT反应器和储存设施的资本支出(CAPEX)和运营支出(OPEX)
# =============================================================================
equipment_raw_costs:
  # FT反应器成本 - FT Reactor Costs
  ft_reactor:
    capex_raw: 5000000                     # FT反应器资本支出(元/单位) | FT reactor CAPEX (yuan/unit)
                                           # 500万元/套，包含设备采购、安装和调试

    opex_raw: 100000                       # FT反应器年运营成本(元/年) | FT reactor annual OPEX (yuan/year)
                                           # 包括维护、备件、人工等固定运营费用

  # 储存设施成本 - Storage Facility Costs
  storage:
    capex_raw: 1500                        # 储存设施资本支出(元/单位) | Storage CAPEX (yuan/unit)
                                           # 包括储罐、管道、泵等设备

    opex_raw: 20                           # 储存设施年运营成本(元/年) | Storage annual OPEX (yuan/year)

# =============================================================================
# FT设施平准化成本参数 (FT Facility LCOE Parameters)
# 用于计算FT反应器设施的平准化成本
# =============================================================================
facility_lcoe_parameters:
  fixed_capex: 50000000                    # 固定资本支出(元) | Fixed CAPEX (yuan)
                                           # FT设施基础设施建设的固定投资部分
                                           # 5000万元包括土地、厂房、公用工程等

  fixed_opex_annual: 15000000              # 年固定运营成本(元/年) | Annual fixed OPEX (yuan/year)
                                           # 管理、人工、公用事业等固定费用
                                           # 1500万元/年

  variable_capex_per_capacity: 30000       # 单位产能资本支出(元/(kg/h)) | Variable CAPEX per capacity (yuan/(kg/h))
                                           # 随产能规模变化的投资
                                           # 3万元/(kg/h产能)
                                           # 注意：这里的capacity单位是kg/h(小时产能)

  variable_opex_per_kg: 0.5                # 单位产品运营成本(元/kg) | Variable OPEX per product (yuan/kg)
                                           # 原材料、能源、催化剂等可变成本
                                           # 0.5元/kg产品

  # FT工艺特定参数 - FT Process Specific Parameters
  catalyst_cost_yuan_per_kg_saf: 0.06      # 催化剂成本(元/kg SAF) | Catalyst cost (yuan/kg SAF)
                                           # 钴基催化剂的单位产品成本

  energy_cost_yuan_per_kwh: 0.6            # 能源成本(元/kWh) | Energy cost (yuan/kWh)
                                           # FT反应器所需的电力和热能成本
