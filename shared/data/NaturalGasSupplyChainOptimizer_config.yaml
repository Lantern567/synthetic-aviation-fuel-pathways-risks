# NaturalGasSupplyChainOptimizer Configuration File
# 天然气供应链优化器参数配置文件
# Version: 1.0

# =============================================================================
# 1. 基础系统参数 (Basic System Parameters)
# =============================================================================
basic_parameters:
  # -------------------------------------------------------------------------
  # 时间范围参数 - 控制优化窗口大小和计算复杂度
  # -------------------------------------------------------------------------
  time_horizon_weeks: 1                    # 优化时间范围(周数)
                                           # ■ 用途：定义优化问题的时间跨度，影响决策变量数量和计算复杂度
                                           # ■ 代码位置：natural_gas_optimization_model.py:229-231
                                           # ■ 影响：
                                           #   - time_horizon_weeks=1: 适合短期运营优化，内存使用小，求解快速
                                           #   - time_horizon_weeks=4: 月度规划，考虑季节性变化
                                           #   - time_horizon_weeks=52: 年度战略规划，计算量大但结果更全面
                                           # ■ 关联：与 total_hours = time_horizon_weeks * hours_per_week 直接相关
                                           # ■ 调参建议：
                                           #   - 调试阶段：使用1周快速测试
                                           #   - 生产环境：根据决策需求选择4周或更长期间
  
  hours_per_week: 168                      # 每周小时数 (7天 * 24小时)
                                           # ■ 用途：时间颗粒度设置，定义小时级决策变量的数量
                                           # ■ 代码位置：natural_gas_optimization_model.py:230-231
                                           # ■ 影响：
                                           #   - 决定生产约束、库存约束、需求约束的时间精度
                                           #   - 影响变量数量：total_hours = time_horizon_weeks * 168
                                           # ■ 注意：通常不需要修改，除非要改变时间单位
  
  # -------------------------------------------------------------------------
  # GraphHopper路径规划设置 - 运输距离和成本计算的基础
  # -------------------------------------------------------------------------
  use_graphhopper_routing: true            # 是否使用GraphHopper本地路径规划服务
                                           # ■ 用途：控制运输距离计算方式（真实路径 vs 直线距离）
                                           # ■ 代码位置：natural_gas_optimization_model.py:238, 路径距离计算函数
                                           # ■ 影响：
                                           #   - true: 使用实际道路距离，更准确但需要GraphHopper服务
                                           #   - false: 使用直线距离估算，快速但精度较低
                                           # ■ 依赖：需要GraphHopper服务运行在指定host:port
                                           # ■ 调参建议：
                                           #   - 精确成本分析：设为true
                                           #   - 快速测试：设为false
  
  graphhopper_host: "localhost"            # GraphHopper服务主机地址
                                           # ■ 用途：指定GraphHopper路径规划服务的IP地址
                                           # ■ 代码位置：natural_gas_optimization_model.py:240
                                           # ■ 配置说明：
                                           #   - "localhost": 本地服务
                                           #   - IP地址: 远程GraphHopper服务器
                                           # ■ 注意：确保对应主机的GraphHopper服务可访问
  
  graphhopper_port: 8989                   # GraphHopper服务端口
                                           # ■ 用途：GraphHopper HTTP API服务端口
                                           # ■ 代码位置：natural_gas_optimization_model.py:241
                                           # ■ 默认值：GraphHopper默认端口为8989
                                           # ■ 注意：需与GraphHopper服务配置保持一致
  
  max_transport_distance_km: 1000.0        # 最大运输距离限制(公里)
                                           # ■ 用途：超过此距离的运输路线将使用直线距离估算
                                           # ■ 代码位置：natural_gas_optimization_model.py:242, 距离计算函数
                                           # ■ 影响：
                                           #   - 平衡计算精度和性能：远距离路径规划耗时长
                                           #   - 运输可行性过滤：超远距离路线可能不经济
                                           # ■ 调参建议：
                                           #   - 区域优化：500-800km
                                           #   - 全国范围：1500-2000km
  
  use_routing_for_short_distance: true     # 对短距离路径是否使用路径规划精确计算
                                           # ■ 用途：控制短距离运输的距离计算精度
                                           # ■ 代码位置：natural_gas_optimization_model.py:243
                                           # ■ 影响：
                                           #   - true: 短距离也使用精确路径规划
                                           #   - false: 短距离使用直线距离，提升性能
                                           # ■ 权衡：精度 vs 计算性能
  
  # -------------------------------------------------------------------------
  # LNG设施容量参数 - 供应能力约束的默认值
  # -------------------------------------------------------------------------
  avg_lng_capacity_mcm_per_year: 1000      # LNG接收站平均容量（万立方米/年）
                                           # ■ 用途：当LNG接收站实际容量数据缺失时的默认值
                                           # ■ 代码位置：natural_gas_optimization_model.py:254, LNG供应约束
                                           # ■ 影响：
                                           #   - 决定LNG接收站的供应能力上限
                                           #   - 影响天然气供应约束和成本计算
                                           # ■ 数据来源：基于中国主要LNG接收站典型容量
                                           # ■ 调参建议：
                                           #   - 大型接收站：1500-3000万m³/年
                                           #   - 中型接收站：500-1000万m³/年
                                           #   - 小型接收站：100-300万m³/年

# =============================================================================
# 2. 经济参数 (Economic Parameters)
# =============================================================================
economic_parameters:
  # -------------------------------------------------------------------------
  # 财务评估核心参数 - NPV和LCOE计算的基础
  # -------------------------------------------------------------------------
  discount_rate: 0.08                      # 贴现率 (年化)
                                           # ■ 用途：NPV计算和平准化成本(LCOE)计算的核心参数
                                           # ■ 代码位置：natural_gas_optimization_model.py:1261-1285 (_calculate_levelized_cost)
                                           # ■ 影响：
                                           #   - 决定未来现金流的现值权重
                                           #   - 影响设备更换成本的现值计算
                                           #   - 直接影响投资决策的经济性评估
                                           # ■ 取值参考：
                                           #   - 低风险项目：5-7%
                                           #   - 中等风险项目：8-10% (当前设置)
                                           #   - 高风险项目：12-15%
                                           # ■ 敏感性：贴现率每增加1%，LCOE通常增加5-10%
  
  project_lifespan: 20                     # 项目总体寿命(年)
                                           # ■ 用途：定义项目生命周期，用于成本效益分析和设备更换计算
                                           # ■ 代码位置：natural_gas_optimization_model.py:1300-1350, 生命周期成本计算
                                           # ■ 影响：
                                           #   - 决定总体投资回收期
                                           #   - 影响设备更换次数和时机
                                           #   - 生命周期运营成本现值计算基础
                                           # ■ 行业标准：化工项目通常为15-25年
                                           # ■ 关联：需与各设备寿命参数配合，确定更换策略
  
  # -------------------------------------------------------------------------
  # 设备寿命参数 - 设备更换成本和折旧计算的依据
  # -------------------------------------------------------------------------
  mtj_plant_lifetime: 20                   # MTJ工厂设备寿命(年)
                                           # ■ 用途：MTJ航煤生产设施的设计寿命
                                           # ■ 代码位置：设备投资成本计算，平准化成本计算
                                           # ■ 特点：
                                           #   - 与项目寿命相等，无需更换
                                           #   - 化工装置典型寿命
                                           #   - 影响固定资产折旧和投资回收
                                           # ■ 技术基础：F-T合成+加氢精制工艺设备寿命
  
  electrolyzer_lifetime: 15                # 电解槽设备寿命(年)
                                           # ■ 用途：电解制氢设备的使用寿命
                                           # ■ 代码位置：电解槽投资成本和更换成本计算
                                           # ■ 更换策略：项目20年内需更换一次(第15年)
                                           # ■ 技术基础：
                                           #   - 质子交换膜电解槽：10-15年
                                           #   - 碱性电解槽：15-20年
                                           # ■ 影响：制氢成本的重要组成部分
  
  pipeline_lifetime: 30                    # 管道设施寿命(年)
                                           # ■ 用途：天然气管道基础设施使用寿命
                                           # ■ 特点：超过项目寿命，无需更换，残值可观
                                           # ■ 代码位置：基础设施投资成本计算
                                           # ■ 技术基础：钢制管道在良好维护下可使用30-50年
                                           # ■ 影响：长期资产，摊销成本相对较低
  
  storage_lifetime: 25                     # 储存设施寿命(年)
                                           # ■ 用途：储存罐体和相关设施的设计寿命
                                           # ■ 特点：超过项目寿命，无需更换
                                           # ■ 技术基础：压力容器和储罐的标准设计寿命
                                           # ■ 代码位置：储存成本计算
  
  transport_vehicle_lifetime: 10           # 运输车辆寿命(年)
                                           # ■ 用途：运输车辆(卡车、槽车)的使用寿命
                                           # ■ 更换策略：项目20年内需更换一次(第10年)
                                           # ■ 代码位置：
                                           #   - natural_gas_optimization_model.py:2886-2916 (平准化运输成本)
                                           #   - _calculate_project_levelized_cost_with_replacement
                                           # ■ 影响：运输成本中设备更换成本的重要组成部分
                                           # ■ 现实依据：商用车辆典型更换周期
  
  # -------------------------------------------------------------------------
  # 容量因子 - 设备实际利用率，影响有效产能和单位成本
  # -------------------------------------------------------------------------
  capacity_factors:
    mtj_plant_capacity_factor: 0.85         # MTJ工厂容量因子
                                             # ■ 用途：MTJ生产设施的年平均利用率
                                             # ■ 代码位置：生产约束、成本计算中的关键参数
                                             # ■ 影响因素：
                                             #   - 计划维护停机：年度大修、日常维护
                                             #   - 原料供应波动：天然气、氢气供应不稳定
                                             #   - 市场需求变化：航煤需求季节性波动
                                             # ■ 行业对比：
                                             #   - 炼油厂：85-90%
                                             #   - 化工装置：80-85%
    
    electrolyzer_capacity_factor: 0.80      # 电解槽容量因子
                                             # ■ 用途：电解制氢设备的利用率
                                             # ■ 特殊性：依赖可再生能源发电，利用率相对较低
                                             # ■ 影响因素：
                                             #   - 风电/光伏发电间歇性
                                             #   - 电网调度策略
                                             #   - 储能系统配置
                                             # ■ 技术发展趋势：随着储能技术发展，有望提升至85-90%
    
    pipeline_capacity_factor: 0.95          # 管道容量因子
                                             # ■ 用途：天然气管道的可用性因子
                                             # ■ 高利用率原因：
                                             #   - 基础设施稳定性高
                                             #   - 维护时间短，计划性强
                                             # ■ 停机原因：定期检查、紧急维修、压力测试
    
    storage_capacity_factor: 0.90           # 储存设施容量因子
                                             # ■ 用途：储存设备的可用性
                                             # ■ 影响因素：罐体检查、安全阀测试、清洗维护
                                             # ■ 运营考虑：预留安全余量，防止超载运行
    
    transport_capacity_factor: 0.75         # 运输设备容量因子
                                             # ■ 用途：运输车辆的可用性因子
                                             # ■ 相对较低原因：
                                             #   - 车辆维修保养时间
                                             #   - 司机休息时间限制
                                             #   - 装卸等待时间
                                             #   - 路况和天气影响
                                             # ■ 优化机会：通过车队管理和调度优化可提升至80-85%

# =============================================================================
# 3. 成本参数 (Cost Parameters)
# =============================================================================
cost_parameters:
  # -------------------------------------------------------------------------
  # 原料成本参数 - 直接运营成本，影响边际生产成本
  # -------------------------------------------------------------------------
  raw_materials:
    natural_gas_price_yuan_per_m3: 3.5           # 天然气采购价格 (元/m³)
                                                 # ■ 用途：天然气作为MTJ生产原料的采购成本
                                                 # ■ 代码位置：天然气消耗成本计算
                                                 # ■ 市场参考：
                                                 #   - 管道气：2.5-3.5元/m³
                                                 #   - LNG现货：3.0-4.5元/m³
                                                 #   - 工业用气：3.0-4.0元/m³
                                                 # ■ 波动因素：国际油价、供需关系、季节性需求
                                                 # ■ 敏感性：天然气成本占MTJ生产成本的30-40%
    
    hydrogen_market_price_yuan_per_kg: 35        # 外购氢气市场价格 (元/kg)
                                                 # ■ 用途：当自制氢气不足时的外购氢气价格
                                                 # ■ 代码位置：氢气供应成本计算
                                                 # ■ 市场现状：
                                                 #   - 灰氢：15-25元/kg
                                                 #   - 蓝氢：25-35元/kg
                                                 #   - 绿氢：35-50元/kg (当前设置)
                                                 # ■ 趋势：绿氢成本预计2030年降至20-30元/kg
                                                 # ■ 对比：自制绿氢边际成本主要是电力成本
    
    renewable_electricity_cost_yuan_per_mwh: 0   # 自发绿电边际成本 (元/MWh)
                                                 # ■ 用途：可再生能源站自发自用电力的边际成本
                                                 # ■ 设置原理：
                                                 #   - 自有风电/光伏的边际成本接近于0
                                                 #   - 固定投资成本已在设备CAPEX中考虑
                                                 #   - 仅考虑运维等变动成本
                                                 # ■ 实际情况：如需考虑机会成本，可设置为上网电价
  
  # -------------------------------------------------------------------------
  # 天然气供应成本 - 不同供应渠道的获取成本差异
  # -------------------------------------------------------------------------
  natural_gas_supply:
    ng_pipeline_cost_yuan_per_mcm: 150           # 管道天然气供应成本 (元/万m³)
                                                 # ■ 用途：从天然气管网获取天然气的供应成本
                                                 # ■ 成本构成：管道使用费、计量费、管理费
                                                 # ■ 优势：供应稳定、成本相对较低
                                                 # ■ 限制：需要管道覆盖，地理位置限制
    
    lng_cost_yuan_per_mcm: 220                   # LNG供应成本 (元/万m³)
                                                 # ■ 用途：从LNG接收站获取天然气的供应成本
                                                 # ■ 成本构成：LNG采购、气化、配送
                                                 # ■ 特点：成本较高但供应灵活性好
                                                 # ■ 适用场景：管道未覆盖地区、调峰供应
  
  # -------------------------------------------------------------------------
  # 电解制氢技术参数 - 绿氢生产的核心技术指标
  # -------------------------------------------------------------------------
  electrolysis:
    electrolysis_efficiency: 0.8                 # 电解效率 (无量纲)
                                                 # ■ 用途：电能转化为氢气的能量转换效率
                                                 # ■ 代码位置：制氢约束、电力需求计算
                                                 # ■ 技术对比：
                                                 #   - 碱性电解槽：65-80%
                                                 #   - PEM电解槽：70-85% (当前设置)
                                                 #   - 固体氧化物电解槽：85-90% (未来技术)
                                                 # ■ 影响：直接决定制氢电耗和成本
    
    electrolysis_power_consumption: 50           # 电解制氢电耗 (kWh/kg H2)
                                                 # ■ 用途：生产1kg氢气所需的电力消耗
                                                 # ■ 代码位置：电力需求约束计算
                                                 # ■ 理论值：33.3 kWh/kg H2 (基于氢气低热值)
                                                 # ■ 实际值：考虑系统效率损失
                                                 #   - 当前技术：45-55 kWh/kg H2
                                                 #   - 先进技术：40-45 kWh/kg H2
                                                 # ■ 关联：与电解效率参数应保持一致
  
  # -------------------------------------------------------------------------
  # 运输成本参数 - 不同运输方式的单位成本
  # -------------------------------------------------------------------------
  transport:
    transport_cost_yuan_per_km_kg: 0.15                    # MTJ产品基础运输成本 (元/km·kg)
                                                           # ■ 用途：MTJ航煤产品从生产地到机场的运输单价
                                                           # ■ 代码位置：目标函数中的运输成本计算
                                                           # ■ 成本构成：燃油费、过路费、司机工资、车辆折旧
                                                           # ■ 对比参考：
                                                           #   - 成品油运输：0.12-0.18元/km·kg
                                                           #   - 化工产品：0.15-0.25元/km·kg
                                                           # ■ 距离敏感性：长距离运输边际成本递减
    
    ng_pipeline_transport_yuan_per_mcm_km: 0.8             # 天然气管道运输 (元/万m³·km)
                                                           # ■ 用途：管道天然气的运输费用
                                                           # ■ 特点：管道运输成本最低，适合大量长距离运输
                                                           # ■ 技术基础：高压管道输送，能耗低
                                                           # ■ 限制：需要管道基础设施
    
    lng_truck_transport_yuan_per_mcm_km: 12.0              # LNG卡车运输 (元/万m³·km)
                                                           # ■ 用途：LNG槽车运输的成本
                                                           # ■ 特点：灵活性高但成本最高
                                                           # ■ 适用场景：管道未覆盖地区、小批量运输
                                                           # ■ 成本构成：车辆投资、保温、司机、燃油
    
    lng_rail_transport_yuan_per_mcm_km: 8.0                # LNG铁路运输 (元/万m³·km)
                                                           # ■ 用途：LNG铁路罐车运输成本
                                                           # ■ 特点：成本适中，适合中等距离大批量运输
                                                           # ■ 限制：需要铁路专线和装卸设施
    
    lng_ship_transport_yuan_per_mcm_km: 4.0                # LNG船舶运输 (元/万m³·km)
                                                           # ■ 用途：LNG船舶运输成本（水路）
                                                           # ■ 特点：大批量长距离运输成本低
                                                           # ■ 限制：需要水路通道和港口设施
    
    integrated_transport_yuan_per_mcm_km: 6.0              # 多式联运综合成本 (元/万m³·km)
                                                           # ■ 用途：公路+铁路+水路组合运输的平均成本
                                                           # ■ 计算方法：各运输方式的加权平均
                                                           # ■ 适用场景：复杂运输网络的简化建模
    
    hydrogen_transport_cost_yuan_per_kg_km: 0.85           # 氢气运输成本 (元/kg·km)
                                                           # ■ 用途：氢气专用运输车辆的运输单价
                                                           # ■ 高成本原因：
                                                           #   - 氢气密度低，单位体积载重小
                                                           #   - 需要高压储罐和特殊安全措施
                                                           #   - 专业司机和设备要求
                                                           # ■ 技术路线：高压氢气槽车运输
    
    ng_truck_transport_yuan_per_m3_km: 0.15                # 常压天然气卡车运输 (元/m³·km)
                                                           # ■ 用途：CNG(压缩天然气)卡车运输成本
                                                           # ■ 适用场景：管道气末端配送
                                                           # ■ 技术特点：中压储运，经济性较好
    
    # -------------------------------------------------------------------------
    # 平准化运输成本计算参数 - 考虑设备投资和运营的综合成本
    # -------------------------------------------------------------------------
    levelized_transport:
      vehicle_capex: 800000                                # 通用运输车辆投资 (元/辆)
                                                           # ■ 用途：运输车辆的购置成本
                                                           # ■ 代码位置：_calculate_levelized_transport_cost
                                                           # ■ 车辆类型：重型危化品运输车
                                                           # ■ 成本构成：车头+罐体+安全设备+牌照
      
      vehicle_opex_annual: 80000                           # 车辆年运营成本 (元/年·辆)
                                                           # ■ 用途：单车年度运营费用
                                                           # ■ 成本构成：
                                                           #   - 司机工资：40000-50000元/年
                                                           #   - 保险费用：8000-12000元/年
                                                           #   - 维修保养：15000-20000元/年
                                                           #   - 年检费用：2000-3000元/年
      
      annual_transport_capacity_kgkm: 100000               # 单车年运输能力 (kg·km/年)
                                                           # ■ 用途：计算平准化运输成本的分母
                                                           # ■ 计算基础：
                                                           #   - 单车载重：20-30吨
                                                           #   - 年行驶里程：8-12万公里
                                                           #   - 载重率：60-80%
                                                           # ■ 影响因素：运输距离、装卸效率、车辆利用率
  
  # -------------------------------------------------------------------------
  # 供应短缺惩罚成本 - 确保供应可靠性的约束机制
  # -------------------------------------------------------------------------
  shortage_penalty_yuan_per_kg: 2500                       # 供应短缺惩罚成本 (元/kg)
                                                           # ■ 用途：当MTJ航煤供应不足时的惩罚成本
                                                           # ■ 代码位置：目标函数中的短缺惩罚项
                                                           # ■ 设置原理：
                                                           #   - 远高于生产成本，确保优先满足需求
                                                           #   - 反映航煤短缺对航空公司的损失
                                                           # ■ 参考依据：
                                                           #   - 航空煤油市场价：6000-8000元/吨
                                                           #   - 短缺损失：包括航班取消、替代燃料溢价等
                                                           # ■ 调参建议：根据供应保障重要性调整

# =============================================================================
# 4.1 设施LCOE快速评估参数 (Facility LCOE Quick Estimation)
# 用于MTJ生产工厂平准化能源成本的快速计算
# =============================================================================
facility_lcoe_parameters:
  # -------------------------------------------------------------------------
  # MTJ生产工厂LCOE评估核心参数
  # -------------------------------------------------------------------------
  fixed_capex: 2000000                             # MTJ工厂固定投资成本 (元)
                                                    # ■ 用途：不依赖产能规模的固定基础设施投资
                                                    # ■ 代码位置：_calculate_correct_facility_lcoe_with_utilization方法
                                                    # ■ 覆盖范围：
                                                    #   - 土地征用和场地准备：300万元
                                                    #   - 公辅设施（供电、供水、废水处理）：800万元
                                                    #   - 控制系统和仪表：400万元
                                                    #   - 其他基础设施：500万元
                                                    # ■ 调参建议：根据项目规模和地理位置调整
                                                    # ■ 敏感性分析：固定成本对小规模项目影响更大
  
  variable_capex_per_capacity: 8000                # 变动投资成本系数 (元/(kg/hour))
                                                    # ■ 用途：按MTJ生产能力线性增长的设备投资
                                                    # ■ 计算方式：总产能(kg/h) × 8000元/(kg/h) 
                                                    # ■ 设备构成（每kg/h产能）：
                                                    #   - F-T反应器：3000元/(kg/h)
                                                    #   - 加氢精制装置：2500元/(kg/h)  
                                                    #   - 分离精制设备：1500元/(kg/h)
                                                    #   - 辅助设备：1000元/(kg/h)
                                                    # ■ 规模效应：大规模生产可降至6000-7000元/(kg/h)
                                                    # ■ 技术进步：预计2030年可降至5000-6000元/(kg/h)
  
  fixed_opex_annual: 1000000                       # 年固定运营成本 (元/年)
                                                    # ■ 用途：不随产量变化的年度运营费用
                                                    # ■ 成本构成：
                                                    #   - 人员工资：600万元/年 (30人×20万元/年)
                                                    #   - 保险费用：200万元/年 (设备价值的2-3%)
                                                    #   - 年检维护：150万元/年
                                                    #   - 管理费用：50万元/年
                                                    # ■ 影响因素：工厂自动化程度、地区工资水平
                                                    # ■ 优化机会：通过数字化管理可减少20-30%人员需求
  
  variable_opex_per_kg: 300                        # 变动运营成本 (元/kg)
                                                    # ■ 用途：每生产1kg MTJ航煤的变动成本
                                                    # ■ 成本细分：
                                                    #   - 催化剂消耗：150元/kg (主要成本)
                                                    #   - 化学品消耗：80元/kg
                                                    #   - 公辅消耗：50元/kg (蒸汽、冷却水)
                                                    #   - 其他消耗品：20元/kg
                                                    # ■ 优化潜力：
                                                    #   - 催化剂回收可降低50-100元/kg
                                                    #   - 工艺优化可减少20-30%化学品用量
                                                    # ■ 对比：传统石油炼制边际成本200-250元/kg

# =============================================================================
# 4.2 目标函数/模型系数 (Objective Coefficients)
# 优化模型目标函数中使用的核心系数和约束参数
# =============================================================================
objective_coefficients:
  # -------------------------------------------------------------------------
  # 氢气生产成本 - 简化制氢经济性评估
  # -------------------------------------------------------------------------
  hydrogen_production_cost_yuan_per_kg: 50                    # 制氢单位成本 (元/kg)
                                                              # ■ 用途：目标函数中氢气生产成本项的系数
                                                              # ■ 代码位置：氢气生产约束和成本计算
                                                              # ■ 简化假设：综合考虑电解制氢的所有成本
                                                              # ■ 成本构成：
                                                              #   - 电力成本：30-40元/kg (主要)
                                                              #   - 设备折旧：8-12元/kg
                                                              #   - 运维成本：2-3元/kg
                                                              # ■ 对比参考：
                                                              #   - 当前绿氢成本：35-60元/kg
                                                              #   - 2030年目标：20-30元/kg
                                                              #   - 灰氢成本：15-25元/kg

  # -------------------------------------------------------------------------
  # 运输投资强度系数 - 用于估算运输基础设施投资需求
  # -------------------------------------------------------------------------
  transport:
    equipment_investment_rate: 0.01                          # 总运输设备投资系数 (无量纲)
                                                              # ■ 用途：根据运输需求估算设备投资
                                                              # ■ 计算公式：投资需求 = 运输量 × 投资系数
                                                              # ■ 应用场景：MTJ产品运输设备投资预算
                                                              # ■ 经验基础：每万吨·km运输能力需要100万元设备投资
    
    hydrogen_transport_investment_rate: 0.002                # 氢气运输投资系数 (无量纲)
                                                              # ■ 用途：氢气专用运输设备投资强度
                                                              # ■ 特殊性：氢气运输需要高压容器，投资密度较低
                                                              # ■ 安全要求：氢气运输车辆需要特殊安全装置
    
    ng_transport_investment_rate: 0.008                      # 天然气运输投资系数 (无量纲)  
                                                              # ■ 用途：天然气运输设备投资强度
                                                              # ■ 技术特点：CNG/LNG运输需要专用压力容器
                                                              # ■ 投资强度：高于氢气但低于液体燃料
    
    annual_transport_capacity_kgkm: 100000                   # 通用车辆年运输能力 (kg·km/年)
                                                              # ■ 用途：标准化运输能力基准
                                                              # ■ 计算基础：
                                                              #   - 单车载重：25吨
                                                              #   - 年行驶里程：10万km
                                                              #   - 平均载重率：40%
                                                              # ■ 实际应用：用于运输投资和成本的标准化计算

  # -------------------------------------------------------------------------
  # 氢气专用运输车辆参数 - 高压氢气运输的专用设备
  # -------------------------------------------------------------------------
  hydrogen_transport_vehicle:
    capex: 1200000                                           # 氢气运输车资本支出 (元/辆)
                                                              # ■ 用途：氢气专用运输车的购置成本
                                                              # ■ 代码位置：氢气运输约束和成本计算
                                                              # ■ 成本构成：
                                                              #   - 车辆底盘：40万元
                                                              #   - 高压储氢罐：60万元 (关键设备)
                                                              #   - 安全系统：15万元
                                                              #   - 其他设备：5万元
                                                              # ■ 技术特点：35MPa或70MPa高压储氢
                                                              # ■ 价格趋势：批量生产后可降至80-100万元/辆
    
    opex_annual: 120000                                      # 年运营成本 (元/年)
                                                              # ■ 用途：氢气运输车年度运营费用
                                                              # ■ 成本明细：
                                                              #   - 司机工资：60000元/年
                                                              #   - 保险费用：25000元/年 (高风险溢价)
                                                              #   - 维修保养：25000元/年 (高压系统维护)
                                                              #   - 年检费用：10000元/年 (特种设备检测)
                                                              # ■ 特殊要求：司机需要危险品运输资质
    
    annual_capacity_kgkm: 50000                              # 年运输能力 (kg·km/年)
                                                              # ■ 用途：单车氢气运输能力基准
                                                              # ■ 能力限制因素：
                                                              #   - 储氢罐容量：500kg
                                                              #   - 年行驶里程：8万km (安全限制)
                                                              #   - 平均载重率：62.5%
                                                              # ■ 实际运营：考虑安全距离和休息时间
    
    max_vehicles_per_day: 48                                 # 日最大车次 (辆次/天)
                                                              # ■ 用途：氢气运输的日运力约束
                                                              # ■ 设计基础：每小时2车次 × 24小时
                                                              # ■ 约束考虑：
                                                              #   - 道路交通安全规定
                                                              #   - 氢气运输时段限制
                                                              #   - 车辆维护保养时间
    
    vehicle_capacity_kg: 500                                 # 单车氢气载重 (kg/辆)
                                                              # ■ 用途：氢气运输车的额定载重量
                                                              # ■ 技术限制：35MPa压力下的储氢密度
                                                              # ■ 安全裕度：实际装载通常为额定容量的90-95%
                                                              # ■ 对比：70MPa系统可达800-1000kg

  # -------------------------------------------------------------------------
  # 天然气运输车辆参数 - CNG/LNG运输专用设备
  # -------------------------------------------------------------------------
  ng_transport_vehicle:
    capex: 600000                                            # 天然气运输车资本支出 (元/辆)
                                                              # ■ 用途：CNG/LNG运输车购置成本
                                                              # ■ 技术成熟：比氢气车技术更成熟，成本较低
                                                              # ■ 成本构成：
                                                              #   - 车辆底盘：25万元
                                                              #   - 气瓶或低温罐：30万元
                                                              #   - 其他设备：5万元
                                                              # ■ CNG vs LNG：LNG运输成本稍高但能耗密度大
    
    opex_annual: 60000                                       # 年运营成本 (元/年)
                                                              # ■ 用途：天然气运输车年运营费用
                                                              # ■ 相比氢气车：运营成本较低，风险等级较低
                                                              # ■ 保险费用：相对较低，技术成熟度高
    
    annual_capacity_m3km: 200000                             # 年运输能力 (m³·km/年)
                                                              # ■ 用途：天然气运输能力标准
                                                              # ■ 换算：约160000 kg·km/年 (按0.8kg/m³密度)
                                                              # ■ 优势：载重量大，运输效率较高
    
    ng_density_kg_per_m3: 0.8                                # 天然气密度 (kg/m³)
                                                              # ■ 用途：体积与质量转换系数
                                                              # ■ 标准条件：0°C, 101.325kPa
                                                              # ■ 主要成分：甲烷（CH₄）密度约0.717kg/m³

  # -------------------------------------------------------------------------
  # 储存设备和仓储成本参数
  # -------------------------------------------------------------------------
  storage:
    equipment_unit_cost_yuan_per_kg: 10                      # MTJ储存设备单位成本 (元/kg)
                                                              # ■ 用途：MTJ产品储罐投资估算
                                                              # ■ 代码位置：储存投资成本计算
                                                              # ■ 技术要求：常温常压储存，技术要求较低
                                                              # ■ 设备构成：储罐、管道、计量、安全系统
    
    hydrogen_equipment_unit_cost_yuan_per_kg: 20             # 氢气储存设备单位成本 (元/kg)
                                                              # ■ 用途：氢气储罐投资估算
                                                              # ■ 高成本原因：
                                                              #   - 高压储存需要特殊材料
                                                              #   - 防氢脆化技术要求
                                                              #   - 安全防护系统复杂
                                                              # ■ 技术选择：高压气态 vs 低温液态
    
    direct_costs:
      warehouse_rent_per_m3_hour: 0.01                       # 仓库租金 (元/m³·小时)
                                                              # ■ 用途：储存空间的时间成本
                                                              # ■ 地区差异：一线城市0.015-0.02，二三线0.005-0.01
      
      storage_density_kg_per_m3: 500                         # 储存密度 (kg/m³)
                                                              # ■ 用途：储存空间需求计算
                                                              # ■ 基准：MTJ航煤密度约775kg/m³，考虑包装和空隙
      
      handling_cost_per_kg_hour: 0.001                       # 搬运成本 (元/kg·小时)
                                                              # ■ 用途：货物装卸和仓储操作成本
                                                              # ■ 自动化程度：影响搬运成本的关键因素

  # -------------------------------------------------------------------------
  # 天然气罐车固定成本模型 - 基于距离的阶梯投资模式
  # -------------------------------------------------------------------------
  ng_truck_fixed_cost:
    truck_purchase_cost: 800000                              # 罐车购置成本 (元/辆)
                                                              # ■ 用途：天然气运输车队投资预算
                                                              # ■ 容量规格：通常为15-25m³罐车
    
    truck_depreciation_years: 8                              # 设备折旧年限 (年)
                                                              # ■ 会计处理：直线法折旧
                                                              # ■ 技术寿命：实际使用寿命10-12年
    
    annual_insurance: 50000                                  # 年保险费 (元/年)
                                                              # ■ 风险评估：天然气运输中等风险级别
                                                              # ■ 保险类型：车辆险、货物险、责任险
    
    annual_maintenance: 40000                                # 年维护成本 (元/年)
                                                              # ■ 维护重点：压力系统、安全装置
                                                              # ■ 预防性维护：降低事故风险的关键
    
    distance_thresholds_km: [50, 150]                        # 距离阈值 (km)
                                                              # ■ 用途：基于运输距离的车队配置阶梯
                                                              # ■ 逻辑：短距离少车，长距离多车
    
    trucks_needed: [1, 2, 3]                                 # 对应车辆数量 (辆)
                                                              # ■ 配置规则：
                                                              #   - ≤50km: 1辆车足够
                                                              #   - 50-150km: 2辆车提高效率
                                                              #   - >150km: 3辆车保障供应连续性

  # -------------------------------------------------------------------------
  # 期末处置成本 - 项目结束时的清理成本
  # -------------------------------------------------------------------------
  final_inventory_disposal_cost_per_kg: 100                  # 期末库存处置成本 (元/kg)
                                                              # ■ 用途：优化期末库存水平，避免过度囤积
                                                              # ■ 代码位置：目标函数中的期末处置项
                                                              # ■ 成本构成：
                                                              #   - 产品贬值：50元/kg
                                                              #   - 处置费用：30元/kg
                                                              #   - 环保处理：20元/kg
                                                              # ■ 策略意义：鼓励Just-in-Time生产和供应

# =============================================================================
# 4. MTJ生产设备成本参数 (MTJ Production Equipment Costs)
# =============================================================================
mtj_production_costs:
  # 主要设备投资成本估算 (元/(kg/hour)产能)
  equipment_costs:
    ft_reactor: 15000              # F-T反应器
    separation_unit: 8000          # 分离单元
    upgrading_unit: 12000          # 加氢精制单元
    heat_exchanger: 5000           # 换热器网络
