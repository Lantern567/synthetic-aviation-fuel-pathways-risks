# =============================================================================
# 经济参数 (Economic Parameters)
# 用于平准化成本(LCOE)计算和经济性评估
# =============================================================================
economic_parameters:
  # 项目经济参数 - Project Economics
  project_lifespan: 20                     # 项目生命周期(年) | Project lifespan (years)
                                           # 用于成本摊销和经济性评估的时间跨度

  discount_rate: 0.08                      # 贴现率 | Discount rate
                                           # 8%年贴现率，用于净现值(NPV)计算
                                           # 反映资金时间价值和投资风险

  levelized_cost_threshold_yuan_per_kg: 7  # 平准化成本阈值(元/kg) | LCOE threshold (yuan/kg)
                                           # 用于经济性边界约束
                                           # 超过此值的方案可能不经济

  # 设备寿命参数 - Equipment Lifetime
  electrolyzer_lifetime: 15                # 电解槽寿命(年) | Electrolyzer lifetime (years)
                                           # 碱性/PEM电解槽的典型使用寿命

  mtj_plant_lifetime: 20                   # MTJ工厂寿命(年) | MTJ plant lifetime (years)
                                           # 化工装置的设计使用寿命

  pipeline_lifetime: 30                    # 管道寿命(年) | Pipeline lifetime (years)
                                           # 管道基础设施的设计使用寿命

  storage_lifetime: 25                     # 储存设施寿命(年) | Storage facility lifetime (years)

  transport_vehicle_lifetime: 20           # 运输车辆寿命(年) | Transport vehicle lifetime (years)

  # 容量系数 - Capacity Factors (实际利用率)
  capacity_factors:
    electrolyzer_capacity_factor: 0.75     # 电解槽容量系数 | Electrolyzer capacity factor
                                           # 考虑维护、检修等因素的实际运行率
                                           # 75% = 年运行6570小时

    mtj_plant_capacity_factor: 0.85        # MTJ工厂容量系数 | MTJ plant capacity factor
                                           # 化工装置的典型年运行率

    pipeline_capacity_factor: 0.95         # 管道容量系数 | Pipeline capacity factor
                                           # 管道系统的高可用性

    storage_capacity_factor: 0.9           # 储存设施容量系数 | Storage facility capacity factor

    transport_capacity_factor: 0.75        # 运输系统容量系数 | Transport system capacity factor
                                           # 考虑天气、维护、调度等因素
# =============================================================================
# 设备原始成本 (Equipment Raw Costs)
# 各类设备的资本支出(CAPEX)和运营支出(OPEX)
# =============================================================================
equipment_raw_costs:
  # 电解槽成本 - Electrolyzer Costs
  electrolyzer:
    capex_raw: 800000                      # 电解槽单位产能投资(元/(kg H₂/hour)) | Electrolyzer unit capacity CAPEX (yuan/(kg H₂/hour))
                                           # 每kg/h产能需要80万元投资，包含设备采购、安装和调试

    opex_raw: 200000                       # 电解槽年运营成本(元/年) | Electrolyzer annual OPEX (yuan/year)
                                           # 包括维护、备件、人工等固定运营费用
                                           # 修正：从800元/年改为200,000元/年，与其他项目保持一致(OPEX/CAPEX=25%)

  # 储存设施成本 - Storage Facility Costs
  storage:
    capex_raw: 2000                        # 储存设施资本支出(元/单位) | Storage CAPEX (yuan/unit)
                                           # 包括储罐、管道、泵等设备
                                           # 统一修正：与其他项目保持一致

    opex_raw: 30                           # 储存设施年运营成本(元/年) | Storage annual OPEX (yuan/year)
                                           # 统一修正：与其他项目保持一致

# =============================================================================
# 设施平准化成本参数 (Facility LCOE Parameters)
# 用于计算综合生产设施的平准化成本
# =============================================================================
facility_lcoe_parameters:
  fixed_capex: 20000000                    # 固定资本支出(元) | Fixed CAPEX (yuan)
                                           # 基础设施建设的固定投资部分
                                           # 2000万元包括土地、厂房、公用工程等

  fixed_opex_annual: 10000000              # 年固定运营成本(元/年) | Annual fixed OPEX (yuan/year)
                                           # 管理、人工、公用事业等固定费用
                                           # 1000万元/年

  variable_capex_per_capacity: 20000       # 单位产能资本支出(元/kg产能) | Variable CAPEX per capacity (yuan/kg)
                                           # 随产能规模变化的投资
                                           # 2万元/kg年产能

  variable_opex_per_kg: 0.3                # 单位产品运营成本(元/kg) | Variable OPEX per product (yuan/kg)
                                           # 原材料、能源等可变成本
                                           # 0.3元/kg产品
