                                                    # ■ 影响因素：管道压力、直径、压缩机功率
                                                    # ■ 安全裕量：考虑维护和紧急情况的备用容量
  
  hydrogen_truck_max_daily_capacity_kg: 10000      # 氢气罐车日最大运输容量(kg H2/day)
                                                    # ■ 用途：罐车运输能力上限约束
                                                    # ■ 排他性约束：与管道运输的对比基准
                                                    # ■ 物流限制：考虑车辆数量和运输距离
  
