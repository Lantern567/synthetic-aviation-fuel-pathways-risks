# =============================================================================
# 19. 运行依赖说明 (Dependencies Documentation)
# 为便于快速部署/迁移，列出运行 natural_gas_optimization_model.py 所需的
# 代码模块、外部Python库、输入数据文件、输出目录与缓存目录。
# 该节是文档性说明，不被模型读取；如需自动读取可在代码中增加解析逻辑。
# 生成时间: 2025-09-17
# =============================================================================
dependencies:
  external_libraries:             # 第三方Python库 (pip install ...)
    - name: gurobipy
      purpose: "MILP优化求解器 (核心)"
      required: true
      import_example: "import gurobipy as gp"
    - name: pandas
      purpose: "数据表读取/清洗 (Excel/CSV/聚合)"
      required: true
    - name: numpy
      purpose: "数值计算/统计"
      required: true
    - name: pyyaml
      purpose: "读取本配置文件"
      required: true
      package: "PyYAML"
    - name: requests
      purpose: "调用GraphHopper HTTP API (启用路径规划时)"
      required: false
    - name: openpyxl
      purpose: "读取Excel机场/基础设施数据 (pandas engine)"
      required: false
    - name: sqlite3
      purpose: "标准库：GraphHopper路径结果本地缓存 (route_cache.db)"
      required: builtin
    - name: logging
      purpose: "标准库：统一日志输出"
      required: builtin
    - name: hashlib
      purpose: "标准库：生成缓存Key"
      required: builtin
    - name: math
      purpose: "标准库：Haversine距离计算"
      required: builtin
  internal_modules:               # 项目内部模块/类 (相对项目根目录)
    - module: shared.utils.log_preserver
      path: shared/utils/log_preserver.py
      symbols: [mount_file_logging]
      purpose: "挂载文件日志 (初始化时)"
    - module: products.supply_chain_optimization.natural_gas_supply_chain_optimization.src.graphhopper_routing_engine
      path: products/supply_chain_optimization/natural_gas_supply_chain_optimization/src/graphhopper_routing_engine.py
      symbols: [GraphHopperRoutingEngine, GraphHopperDistanceCalculator, DistanceCalculator]
      purpose: "GraphHopper路径规划与距离计算"
      conditional: "use_graphhopper_routing=true 时必需"
    - module: products.supply_chain_optimization.natural_gas_supply_chain_optimization.src.data_cache_manager
      path: products/supply_chain_optimization/natural_gas_supply_chain_optimization/src/data_cache_manager.py
      symbols: [cache_manager]
      purpose: "可再生能源/管道/LNG数据500km过滤与缓存"
    - module: products.supply_chain_optimization.natural_gas_supply_chain_optimization.src.pipeline_coordinate_integrator
      path: products/supply_chain_optimization/natural_gas_supply_chain_optimization/src/pipeline_coordinate_integrator.py
      purpose: "(可选) 管道坐标/容量整合，若执行预处理脚本"
      optional: true
    - module: products.supply_chain_optimization.natural_gas_supply_chain_optimization.src.direct_capacity_preprocessor
      path: products/supply_chain_optimization/natural_gas_supply_chain_optimization/src/direct_capacity_preprocessor.py
      purpose: "(可选) 产能预处理工具"
      optional: true
    - module: products.supply_chain_optimization.natural_gas_supply_chain_optimization.src.transport_route_visualizer
      path: products/supply_chain_optimization/natural_gas_supply_chain_optimization/src/transport_route_visualizer.py
      purpose: "(可选) 路由/运输方案可视化"
      optional: true
    - module: shared.utils.geographic_calculator
      path: shared/utils/geographic_calculator.py
      purpose: "(可选) 通用地理距离/方位计算 (若代码中扩展调用)"
      optional: true
  main_entry:
    class: NaturalGasSupplyChainOptimizer
    source_file: products/supply_chain_optimization/natural_gas_supply_chain_optimization/src/natural_gas_optimization_model.py
    key_init_args: [config_path, use_graphhopper_routing, osm_pbf_path]
    construction_steps: |
      1. _load_config -> 读取本YAML
      2. 初始化GraphHopper (可选) & 日志系统
      3. 调用 load_data(...) 或 load_data_from_excel(...) 构建模型数据
      4. 定义技术/成本/位置映射 -> 构建MILP模型 -> optimize
  data_inputs:                 # 运行前应准备的核心数据文件/目录 (若未覆盖override)
    airports_excel: "products/aviation_fuel_analysis/resource_flight_data_process/results/flights_beijing_tianjing/all_airports_weekly_parameters_20250726_142747.xlsx"
    airports_excel_backup: "products/aviation_fuel_analysis/resource_flight_data_process/data/capital_binhai_airports_data_20250726_123415.xlsx"
    wind_data_dir: "products/aviation_fuel_analysis/resource_flight_data_process/results/3hourly_generation"
    solar_data_dir: "products/aviation_fuel_analysis/resource_flight_data_process/results/solar_generation"
    ng_pipelines_preprocessed: "products/gis_energy_mapping/gis_data_scraper/scraped_gis_data/natural_gas_pipelines_with_capacity.xlsx"
    ng_pipelines_integrated: "products/supply_chain_optimization/natural_gas_supply_chain_optimization/data/integrated_gas_pipeline_price_data_with_coords.csv"
    ng_pipelines_original: "products/gis_energy_mapping/scraped_gis_data/natural_gas_pipelines.csv"
    lng_terminals_preprocessed: "products/gis_energy_mapping/gis_data_scraper/scraped_gis_data/lng_terminals_with_capacity.xlsx"
    lng_terminals_original: "products/gis_energy_mapping/gis_data_scraper/scraped_gis_data/lng_terminals.csv"
    osm_pbf_default: "products/supply_chain_optimization/natural_gas_supply_chain_optimization/data/china-latest.osm.pbf"
    renewable_plants_in_memory: "说明: 可再生能源数据通过DataFrame传入，不固定文件，可选写入临时缓存"
  output_artifacts:            # 由 file_templates 定义的结果文件 (位于 results_base_dir)
    dir: "products/supply_chain_optimization/natural_gas_supply_chain_optimization/results"
    templates_ref: data_paths.output_paths.file_templates
    typical_files:
      - optimization_summary_{timestamp}.csv
      - facility_decisions_{timestamp}.csv
      - complete_solution_{timestamp}.json
  cache_and_temp:
    renewable_filter_cache_dir: "cache/filtered_500km_data"          # 500km过滤后的可再生能源缓存
    graphhopper_route_cache_dir: "shared/data/cache/graphhopper_routes" # 路由JSON与SQLite缓存
    graphhopper_sqlite: "shared/data/cache/graphhopper_routes/route_cache.db"
    naming_convention: "temp_renewable_<records>_<plants>.csv 用于判定缓存有效性"
  runtime_flags:
    use_graphhopper_routing: "true=HTTP路径规划 (requests) | false=降级直线距离"
    use_routing_for_short_distance: "控制短距离是否仍调用GraphHopper"
  environment_recommendation:
    python_version: ">=3.10"
    memory_suggestion_gb: 8
    notes: |
      若启用GraphHopper请确保本地已启动: java -Xmx8g -jar graphhopper-web-*.jar server config.yml
      并保证 OSM PBF 文件与缓存目录具有写权限。gurobipy 需有效License。
  quick_validation_checklist: |
    1. pip install -r requirements.txt (确保gurobipy已就绪)
    2. 检查 airports_excel 是否存在
    3. 检查 wind/solar 目录存在且含CSV
    4. 检查 ng_pipelines_integrated / lng_terminals_preprocessed 是否存在 (缺失则退化处理或需先运行预处理脚本)
    5. (可选) 启动GraphHopper服务; 不启用则设 use_graphhopper_routing=false
    6. 运行一个最小示例: 实例化优化器 -> 构造少量抽样数据 -> optimize
  maintenance: |
    - 如新增内部模块，请在 internal_modules 追加条目
    - 如调整数据路径，请同步修改 data_paths 与本节 data_inputs

# =============================================================================
# 12. 碳排放计算参数 (Carbon Emission Parameters)
# =============================================================================
# 基于SAF生命周期碳排放计算方法，用于跟踪和评估供应链各阶段的碳排放
# 参考文档: docs/SAF_Carbon_Emission_Calculation.md
# 更新日期: 2025-01-28
carbon_emission_parameters:
  # -------------------------------------------------------------------------
  # 原料获取阶段 (Raw Materials Extraction)
  # -------------------------------------------------------------------------
  raw_materials:
    ng_extraction_intensity: 0.25         # 天然气开采碳强度 (kg CO2eq/m³)
                                         # ■ 数据来源：中国天然气行业平均值
                                         # ■ 包含：开采、净化、压缩等过程排放
                                         # ■ 范围：0.2-0.3 kg CO2eq/m³

    ng_pipeline_transport: 0.01          # 天然气管道运输碳强度 (kg CO2eq/m³·km)
                                         # ■ 数据来源：管道运输行业数据
                                         # ■ 包含：压缩站能耗、泄漏损失
                                         # ■ 范围：0.005-0.02 kg CO2eq/m³·km

  # -------------------------------------------------------------------------
  # 设施建设阶段 (Facility Construction) - 年摊销
  # -------------------------------------------------------------------------
  facility_construction:
    saf_facility_embodied: 150           # SAF工厂建设碳强度 (kg CO2eq/t年产能)
                                         # ■ 包含：材料生产、设备制造、建设施工
                                         # ■ 范围：100-200 kg CO2eq/t年产能
    saf_facility_lifetime: 25            # SAF工厂设计寿命 (年)
                                         # ■ 用于碳排放摊销计算

    electrolyzer_embodied: 1200          # 电解槽制造碳强度 (kg CO2eq/MW)
                                         # ■ 包含：材料、制造、运输、安装
                                         # ■ 范围：1000-1500 kg CO2eq/MW
    electrolyzer_lifetime: 20            # 电解槽设计寿命 (年)
                                         # ■ 考虑膜材料更换周期

    storage_facility_embodied: 75        # 储罐设施碳强度 (kg CO2eq/m³)
                                         # ■ 包含：钢材、混凝土、保温材料
                                         # ■ 范围：50-100 kg CO2eq/m³
    storage_facility_lifetime: 30        # 储罐设施寿命 (年)

  # -------------------------------------------------------------------------
  # 生产过程阶段 (Production Process)
  # -------------------------------------------------------------------------
  production_process:
    # 天然气制甲醇过程
    ng_to_methanol_rate: 1.2            # 天然气消耗率 (m³ NG/kg甲醇)
                                         # ■ 基于转化效率和工艺损失
    ng_process_emission: 0.8            # 工艺排放因子 (kg CO2eq/m³ NG)
                                         # ■ 包含：反应CO2、燃烧排放、逸散

    # 甲醇制SAF过程（MTJ）
    mtj_process_energy: 800             # MTJ工艺电耗 (kWh/t SAF)
                                         # ■ 包含：反应、分离、精制过程
    renewable_electricity: 0.02         # 可再生电力碳强度 (kg CO2eq/kWh)
                                         # ■ 风电/光伏全生命周期排放
                                         # ■ 范围：0.01-0.05 kg CO2eq/kWh

    # 绿氢生产过程
    electrolysis_energy: 55             # 电解制氢能耗 (kWh/kg H2)
                                         # ■ 基于PEM/碱性电解技术
                                         # ■ 范围：50-60 kWh/kg H2
    green_h2_intensity: 1.1             # 绿氢生产碳强度 (kg CO2eq/kg H2)
                                         # ■ 使用可再生电力的间接排放
                                         # ■ 计算：55 kWh/kg × 0.02 kg/kWh = 1.1

    # 氢气加入量
    h2_addition_rate: 40                # 氢气加入量 (kg H2/t SAF)
                                         # ■ 用于改善SAF品质

  # -------------------------------------------------------------------------
  # 储存处理阶段 (Storage & Handling)
  # -------------------------------------------------------------------------
  storage_handling:
    mtj_storage_energy: 5               # MTJ储存能耗 (kWh/t·天)
                                         # ■ 包含：泵送、温控、监测
    h2_storage_energy: 0.5              # 氢气压缩储存能耗 (kWh/kg H2·天)
                                         # ■ 压缩至350-700 bar储存
    storage_loss_rate: 0.001            # 储存损失率 (/天)
                                         # ■ 蒸发、泄漏损失

  # -------------------------------------------------------------------------
  # 运输配送阶段 (Transportation & Distribution)
  # -------------------------------------------------------------------------
  transportation:
    # 氢气运输
    h2_pipeline_intensity: 0.005        # 氢气管道运输碳强度 (kg CO2eq/kg·km)
                                         # ■ 包含：压缩站能耗
                                         # ■ 适用距离：100-500 km
    h2_truck_intensity: 0.15           # 氢气罐车运输碳强度 (kg CO2eq/kg·km)
                                         # ■ 高压罐车运输
                                         # ■ 适用距离：50-200 km

    # MTJ/SAF运输
    mtj_truck_intensity: 0.12          # MTJ罐车运输碳强度 (kg CO2eq/t·km)
                                         # ■ 标准液体罐车
                                         # ■ 适用距离：100-300 km

    # 天然气运输
    ng_truck_intensity: 0.10           # 天然气罐车运输碳强度 (kg CO2eq/m³·km)
                                         # ■ CNG/LNG罐车运输

  # -------------------------------------------------------------------------
  # 碳强度目标与基准 (Carbon Intensity Targets & Benchmarks)
  # -------------------------------------------------------------------------
  benchmarks:
    traditional_jet_fuel: 89            # 传统航煤碳强度 (g CO2eq/MJ)
                                         # ■ ICAO基准值（不含燃烧）
    corsia_limit: 30                    # CORSIA碳强度要求 (g CO2eq/MJ)
                                         # ■ 2027年后SAF标准
    saf_energy_content: 43.15           # SAF能量密度 (MJ/kg)
                                         # ■ 用于质量-能量转换

  # -------------------------------------------------------------------------
  # 计算控制参数 (Calculation Control Parameters)
  # -------------------------------------------------------------------------
  calculation_control:
    enable_carbon_tracking: true        # 是否启用碳排放跟踪
    include_facility_construction: true # 是否包含设施建设排放
    use_lifecycle_amortization: true   # 是否使用生命周期摊销
    carbon_report_detail_level: 2      # 报告详细程度 (1-简单, 2-标准, 3-详细)
    save_carbon_csv: true              # 是否保存碳排放CSV文件
    carbon_log_level: "INFO"           # 碳排放日志级别
    # 注：可在CI中添加脚本校验这些文件是否存在以提前失败
