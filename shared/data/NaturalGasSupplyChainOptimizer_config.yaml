# NaturalGasSupplyChainOptimizer Configuration File
# 天然气供应链优化器参数配置文件
# Version: 1.1 - 2025年市场数据优化版本
# 更新日期: 2025-09-01
# 主要更新: 基于最新行业数据调整制氢成本、天然气价格等关键参数

# =============================================================================
# 1. 基础系统参数 (Basic System Parameters)
# =============================================================================
basic_parameters:
  # -------------------------------------------------------------------------
  # 时间范围参数 - 控制优化窗口大小和计算复杂度
  # -------------------------------------------------------------------------
  time_horizon_weeks: 1                    # 优化时间范围(周数)
                                           # ■ 用途：定义优化问题的时间跨度，影响决策变量数量和计算复杂度
                                           # ■ 代码位置：natural_gas_optimization_model.py:229-231
                                           # ■ 影响：
                                           #   - time_horizon_weeks=1: 适合短期运营优化，内存使用小，求解快速
                                           #   - time_horizon_weeks=4: 月度规划，考虑季节性变化
                                           #   - time_horizon_weeks=52: 年度战略规划，计算量大但结果更全面
                                           # ■ 关联：与 total_hours = time_horizon_weeks * hours_per_week 直接相关
                                           # ■ 调参建议：
                                           #   - 调试阶段：使用1周快速测试
                                           #   - 生产环境：根据决策需求选择4周或更长期间
  
  hours_per_week: 168                      # 每周小时数 (7天 * 24小时)
                                           # ■ 用途：时间颗粒度设置，定义小时级决策变量的数量
                                           # ■ 代码位置：natural_gas_optimization_model.py:230-231
                                           # ■ 影响：
                                           #   - 决定生产约束、库存约束、需求约束的时间精度
                                           #   - 影响变量数量：total_hours = time_horizon_weeks * 168
                                           # ■ 注意：通常不需要修改，除非要改变时间单位
  
  # -------------------------------------------------------------------------
  # GraphHopper路径规划设置 - 运输距离和成本计算的基础
  # -------------------------------------------------------------------------
  use_graphhopper_routing: true            # 是否使用GraphHopper本地路径规划服务
                                           # ■ 用途：控制运输距离计算方式（真实路径 vs 直线距离）
                                           # ■ 代码位置：natural_gas_optimization_model.py:238, 路径距离计算函数
                                           # ■ 影响：
                                           #   - true: 使用实际道路距离，更准确但需要GraphHopper服务
                                           #   - false: 使用直线距离估算，快速但精度较低
                                           # ■ 依赖：需要GraphHopper服务运行在指定host:port
                                           # ■ 调参建议：
                                           #   - 精确成本分析：设为true
                                           #   - 快速测试：设为false
  
  graphhopper_host: "localhost"            # GraphHopper服务主机地址
                                           # ■ 用途：指定GraphHopper路径规划服务的IP地址
                                           # ■ 代码位置：natural_gas_optimization_model.py:240
                                           # ■ 配置说明：
                                           #   - "localhost": 本地服务
                                           #   - IP地址: 远程GraphHopper服务器
                                           # ■ 注意：确保对应主机的GraphHopper服务可访问
  
  graphhopper_port: 8989                   # GraphHopper服务端口
                                           # ■ 用途：GraphHopper HTTP API服务端口
                                           # ■ 代码位置：natural_gas_optimization_model.py:241
                                           # ■ 默认值：GraphHopper默认端口为8989
                                           # ■ 注意：需与GraphHopper服务配置保持一致
  
  max_transport_distance_km: 1000.0        # 最大运输距离限制(公里)
                                           # ■ 用途：超过此距离的运输路线将使用直线距离估算
                                           # ■ 代码位置：natural_gas_optimization_model.py:242, 距离计算函数
                                           # ■ 影响：
                                           #   - 平衡计算精度和性能：远距离路径规划耗时长
                                           #   - 运输可行性过滤：超远距离路线可能不经济
                                           # ■ 调参建议：
                                           #   - 区域优化：500-800km
                                           #   - 全国范围：1500-2000km
  
  use_routing_for_short_distance: true     # 对短距离路径是否使用路径规划精确计算
                                           # ■ 用途：控制短距离运输的距离计算精度
                                           # ■ 代码位置：natural_gas_optimization_model.py:243
                                           # ■ 影响：
                                           #   - true: 短距离也使用精确路径规划
                                           #   - false: 短距离使用直线距离，提升性能
                                           # ■ 权衡：精度 vs 计算性能

  # -------------------------------------------------------------------------
  # 氢气管道运输设置 - 控制氢气运输距离计算方式
  # -------------------------------------------------------------------------
  use_hydrogen_pipeline_distance: true    # 是否使用氢气管道距离计算
                                           # ■ 用途：启用氢气管道运输距离计算功能
                                           # ■ 代码位置：natural_gas_optimization_model.py:342, 3885
                                           # ■ 影响：
                                           #   - true: 使用氢气管道距离计算器进行精确的管道路径计算
                                           #   - false: 禁用氢气管道距离计算，使用备用方法
                                           # ■ 依赖：需要hydrogen_pipeline_distance_calculator模块和GIS管道数据
                                           # ■ 数据要求：
                                           #   - products/gis_energy_mapping/gis_data_scraper/scraped_gis_data/crude_pipelines.geojson
                                           #   - products/gis_energy_mapping/gis_data_scraper/scraped_gis_data/refined_pipelines.geojson
                                           #   - products/gis_energy_mapping/gis_data_scraper/scraped_gis_data/natural_gas_pipelines.geojson
  
  # -------------------------------------------------------------------------
  # LNG设施容量参数 - 供应能力约束的默认值
  # -------------------------------------------------------------------------
  avg_lng_capacity_mcm_per_year: 1000      # LNG接收站平均容量（万立方米/年）
                                           # ■ 用途：当LNG接收站实际容量数据缺失时的默认值
                                           # ■ 代码位置：natural_gas_optimization_model.py:254, LNG供应约束
                                           # ■ 影响：
                                           #   - 决定LNG接收站的供应能力上限
                                           #   - 影响天然气供应约束和成本计算
                                           # ■ 数据来源：基于中国主要LNG接收站典型容量
                                           # ■ 调参建议：
                                           #   - 大型接收站：1500-3000万m³/年
                                           #   - 中型接收站：500-1000万m³/年
                                           #   - 小型接收站：100-300万m³/年

# =============================================================================
# 2. 经济参数 (Economic Parameters)
# =============================================================================
economic_parameters:
  # -------------------------------------------------------------------------
  # 财务评估核心参数 - NPV和LCOE计算的基础
  # -------------------------------------------------------------------------
  discount_rate: 0.08                      # 贴现率 (年化)
                                           # ■ 用途：NPV计算和平准化成本(LCOE)计算的核心参数
                                           # ■ 代码位置：natural_gas_optimization_model.py:1261-1285 (_calculate_levelized_cost)
                                           # ■ 影响：
                                           #   - 决定未来现金流的现值权重
                                           #   - 影响设备更换成本的现值计算
                                           #   - 直接影响投资决策的经济性评估
                                           # ■ 取值参考：
                                           #   - 低风险项目：5-7%
                                           #   - 中等风险项目：8-10% (当前设置)
                                           #   - 高风险项目：12-15%
                                           # ■ 敏感性：贴现率每增加1%，LCOE通常增加5-10%
  
  project_lifespan: 20                     # 项目总体寿命(年)
                                           # ■ 用途：定义项目生命周期，用于成本效益分析和设备更换计算
                                           # ■ 代码位置：natural_gas_optimization_model.py:1300-1350, 生命周期成本计算
                                           # ■ 影响：
                                           #   - 决定总体投资回收期
                                           #   - 影响设备更换次数和时机
                                           #   - 生命周期运营成本现值计算基础
                                           # ■ 行业标准：化工项目通常为15-25年
                                           # ■ 关联：需与各设备寿命参数配合，确定更换策略

  # -------------------------------------------------------------------------
  # 平准化成本约束参数 - 经济可行性门槛控制
  # -------------------------------------------------------------------------
  levelized_cost_threshold_yuan_per_kg: 6.7   # 不含短缺成本的平准化成本门槛值(元/kg)
                                           # ■ 用途：限制优化方案的平准化成本上限，确保经济可行性
                                           # ■ 代码位置：natural_gas_optimization_model.py _create_objective_function方法
                                           # ■ 约束公式：(总成本现值-短缺成本现值) / 总产量现值 <= 门槛值
                                           # ■ 影响：
                                           #   - 过滤掉经济不可行的优化方案
                                           #   - 确保最终方案符合市场竞争力要求
                                           #   - 与传统燃料成本比较的基准
                                           # ■ 调参建议：
                                           #   - 严格约束：4-5元/kg（接近传统燃料成本）
                                           #   - 中等约束：5-7元/kg（考虑环境溢价）
                                           #   - 宽松约束：7-10元/kg（技术发展阶段）

  # -------------------------------------------------------------------------
  # 设备寿命参数 - 设备更换成本和折旧计算的依据
  # -------------------------------------------------------------------------
  mtj_plant_lifetime: 20                   # MTJ工厂设备寿命(年)
                                           # ■ 用途：MTJ航煤生产设施的设计寿命
                                           # ■ 代码位置：设备投资成本计算，平准化成本计算
                                           # ■ 特点：
                                           #   - 与项目寿命相等，无需更换
                                           #   - 化工装置典型寿命
                                           #   - 影响固定资产折旧和投资回收
                                           # ■ 技术基础：F-T合成+加氢精制工艺设备寿命
  
  electrolyzer_lifetime: 15                # 电解槽设备寿命(年)
                                           # ■ 用途：电解制氢设备的使用寿命
                                           # ■ 代码位置：电解槽投资成本和更换成本计算
                                           # ■ 更换策略：项目20年内需更换一次(第15年)
                                           # ■ 技术基础：
                                           #   - 质子交换膜电解槽：10-15年
                                           #   - 碱性电解槽：15-20年
                                           # ■ 影响：制氢成本的重要组成部分
  
  pipeline_lifetime: 30                    # 管道设施寿命(年)
                                           # ■ 用途：天然气管道基础设施使用寿命
                                           # ■ 特点：超过项目寿命，无需更换，残值可观
                                           # ■ 代码位置：基础设施投资成本计算
                                           # ■ 技术基础：钢制管道在良好维护下可使用30-50年
                                           # ■ 影响：长期资产，摊销成本相对较低
  
  storage_lifetime: 25                     # 储存设施寿命(年)
                                           # ■ 用途：储存罐体和相关设施的设计寿命
                                           # ■ 特点：超过项目寿命，无需更换
                                           # ■ 技术基础：压力容器和储罐的标准设计寿命
                                           # ■ 代码位置：储存成本计算
  
  transport_vehicle_lifetime: 20           # 运输车辆寿命(年)
                                           # ■ 用途：运输车辆(卡车、槽车)的使用寿命
                                           # ■ 更换策略：项目20年内需更换一次(第10年)
                                           # ■ 代码位置：
                                           #   - natural_gas_optimization_model.py:2886-2916 (平准化运输成本)
                                           #   - _calculate_project_levelized_cost_with_replacement
                                           # ■ 影响：运输成本中设备更换成本的重要组成部分
                                           # ■ 现实依据：商用车辆典型更换周期

  # -------------------------------------------------------------------------
  # 经济性约束参数 - 项目经济可行性控制
  # -------------------------------------------------------------------------
  # lifecycle_unit_cost_threshold_yuan_per_kg: 7    # 生命周期单位成本阈值 (元/kg) - 已统一使用levelized_cost_threshold_yuan_per_kg
                                           # ■ 用途：控制项目生命周期平均单位成本上限，确保经济可行性
                                           # ■ 代码位置：_add_economic_constraints方法中的核心约束
                                           # ■ 约束公式：(总投资成本 + 总运营成本现值) / 生命周期总产量 ≤ 阈值
                                           # ■ 成本组成：
                                           #   - 投资成本：MTJ设施、电解槽、储存设备等固定投资
                                           #   - 运营成本：原料、电力、维护、运输等变动成本的20年现值
                                           # ■ 设置依据：
                                           #   - 基于绿色甲醇市场价格和成本竞争力分析
                                           #   - 确保项目相比传统燃料具有经济竞争力
                                           #   - 为投资决策提供明确的成本控制目标
                                           # ■ 调参指导：
                                           #   - 降低阈值：提高经济要求，可能导致更少的可行解
                                           #   - 提高阈值：放松经济约束，增加可行解空间
                                           #   - 建议范围：4.0-8.0元/kg，基于不同市场条件调整
                                           # ■ 敏感性：该参数直接影响优化模型的可行性和解的质量
  
  # -------------------------------------------------------------------------
  # 容量因子 - 设备实际利用率，影响有效产能和单位成本
  # -------------------------------------------------------------------------
  capacity_factors:
    mtj_plant_capacity_factor: 0.85         # MTJ工厂容量因子
                                             # ■ 用途：MTJ生产设施的年平均利用率
                                             # ■ 代码位置：生产约束、成本计算中的关键参数
                                             # ■ 影响因素：
                                             #   - 计划维护停机：年度大修、日常维护
                                             #   - 原料供应波动：天然气、氢气供应不稳定
                                             #   - 市场需求变化：航煤需求季节性波动
                                             # ■ 行业对比：
                                             #   - 炼油厂：85-90%
                                             #   - 化工装置：80-85%
    
    electrolyzer_capacity_factor: 0.75      # 电解槽容量因子 (2025年优化: 考虑可再生能源间歇性)
                                             # ■ 用途：电解制氢设备的利用率
                                             # ■ 特殊性：依赖可再生能源发电，利用率相对较低
                                             # ■ 影响因素：
                                             #   - 风电/光伏发电间歇性
                                             #   - 电网调度策略
                                             #   - 储能系统配置
                                             # ■ 技术发展趋势：随着储能技术发展，有望提升至85-90%
    
    pipeline_capacity_factor: 0.95          # 管道容量因子
                                             # ■ 用途：天然气管道的可用性因子
                                             # ■ 高利用率原因：
                                             #   - 基础设施稳定性高
                                             #   - 维护时间短，计划性强
                                             # ■ 停机原因：定期检查、紧急维修、压力测试
    
    storage_capacity_factor: 0.90           # 储存设施容量因子
                                             # ■ 用途：储存设备的可用性
                                             # ■ 影响因素：罐体检查、安全阀测试、清洗维护
                                             # ■ 运营考虑：预留安全余量，防止超载运行
    
    transport_capacity_factor: 0.75         # 运输设备容量因子
                                             # ■ 用途：运输车辆的可用性因子
                                             # ■ 相对较低原因：
                                             #   - 车辆维修保养时间
                                             #   - 司机休息时间限制
                                             #   - 装卸等待时间
                                             #   - 路况和天气影响
                                             # ■ 优化机会：通过车队管理和调度优化可提升至80-85%

# =============================================================================
# 3. 成本参数 (Cost Parameters)
# =============================================================================
cost_parameters:
  # -------------------------------------------------------------------------
  # 原料成本参数 - 直接运营成本，影响边际生产成本
  # -------------------------------------------------------------------------
  raw_materials:
    natural_gas_price_yuan_per_m3: 4.2           # 天然气采购价格 (元/m³) - 2025年市场价格更新
                                                 # ■ 用途：天然气作为MTJ生产原料的采购成本
                                                 # ■ 代码位置：天然气消耗成本计算
                                                 # ■ 注意：此参数已被 unified_costs.raw_materials.natural_gas_base_price_yuan_per_m3 替代
                                                 # ■ 市场参考：
                                                 #   - 管道气：2.5-3.5元/m³
                                                 #   - LNG现货：3.0-4.5元/m³
                                                 #   - 工业用气：3.0-4.0元/m³
                                                 # ■ 波动因素：国际油价、供需关系、季节性需求
                                                 # ■ 敏感性：天然气成本占MTJ生产成本的30-40%
    
    hydrogen_market_price_yuan_per_kg: 30        # 外购氢气市场价格 (元/kg) - 2025年绿氢成本下降
                                                 # ■ 用途：当自制氢气不足时的外购氢气价格
                                                 # ■ 代码位置：氢气供应成本计算
                                                 # ■ 注意：此参数已被 unified_costs.raw_materials.hydrogen_market_price_yuan_per_kg 替代
                                                 # ■ 市场现状：
                                                 #   - 灰氢：15-25元/kg
                                                 #   - 蓝氢：25-35元/kg
                                                 #   - 绿氢：35-50元/kg (当前设置)
                                                 # ■ 趋势：绿氢成本预计2030年降至20-30元/kg
                                                 # ■ 对比：自制绿氢边际成本主要是电力成本
    
    renewable_electricity_cost_yuan_per_mwh: 500   # 自发绿电边际成本 (元/MWh)
                                                 # ■ 用途：可再生能源站自发自用电力的边际成本
                                                 # ■ 设置原理：
                                                 #   - 自有风电/光伏的边际成本接近于0
                                                 #   - 固定投资成本已在设备CAPEX中考虑
                                                 #   - 仅考虑运维等变动成本
                                                 # ■ 实际情况：如需考虑机会成本，可设置为上网电价
  
  
  # -------------------------------------------------------------------------
  # 电解制氢技术参数 - 绿氢生产的核心技术指标
  # -------------------------------------------------------------------------
  electrolysis:
    electrolysis_efficiency: 0.8                 # 电解效率 (无量纲)
                                                 # ■ 用途：电能转化为氢气的能量转换效率
                                                 # ■ 代码位置：制氢约束、电力需求计算
                                                 # ■ 技术对比：
                                                 #   - 碱性电解槽：65-80%
                                                 #   - PEM电解槽：70-85% (当前设置)
                                                 #   - 固体氧化物电解槽：85-90% (未来技术)
                                                 # ■ 影响：直接决定制氢电耗和成本
    
    electrolysis_power_consumption: 45           # 电解制氢电耗 (kWh/kg H2) - 先进PEM技术参数
                                                 # ■ 用途：生产1kg氢气所需的电力消耗
                                                 # ■ 代码位置：电力需求约束计算
                                                 # ■ 理论值：33.3 kWh/kg H2 (基于氢气低热值)
                                                 # ■ 实际值：考虑系统效率损失
                                                 #   - 当前技术：45-55 kWh/kg H2
                                                 #   - 先进技术：40-45 kWh/kg H2
                                                 # ■ 关联：与电解效率参数应保持一致
  
    
    # -------------------------------------------------------------------------
    # MTJ成品燃料（就是航煤）运输成本计算参数 - 从MTJ工厂到机场的航空燃料运输
    # 注意：已改用基于运输理论公式的计算方法 (formula_based_transport)
    # -------------------------------------------------------------------------
    
    # -------------------------------------------------------------------------
    # 基于运输理论的MTJ成品燃料运输成本计算参数
    # 公式: c_kg(S) = F_trip/Q_kg + v_km/Q_kg * S
    # 其中: S(km)距离, Q_kg实际装载质量, F_trip单次往返固定成本, v_km单位里程变动成本
    # -------------------------------------------------------------------------
    formula_based_transport:
      # F_trip: 单次往返的固定成本(元/趟) - 与里程无关的固定费用
      trip_fixed_cost: 2000                               # 单次往返固定成本 (元/趟)
                                                           # ■ 用途: 公式中的F_trip参数，每次运输的固定费用
                                                           # ■ 成本构成:
                                                           #   - 装车/卸车费用: 500-800元/趟
                                                           #   - 司机固定费用: 400-600元/趟 
                                                           #   - 车辆折旧分摊: 300-500元/趟
                                                           #   - 保险/管理费: 200-400元/趟
                                                           #   - 通行费/码头费: 200-600元/趟
      
      # v_km: 单位里程变动成本(元/公里) - 与里程成正比的费用  
      variable_cost_per_km: 15.0                           # 单位里程变动成本 (元/公里)
                                                           # ■ 用途: 公式中的v_km参数，每公里的变动费用
                                                           # ■ 成本构成:
                                                           #   - 燃油费用: 8-12元/公里 (柴油消耗)
                                                           #   - 轮胎磨损: 1-2元/公里
                                                           #   - 维修保养: 2-3元/公里
                                                           #   - 司机里程补贴: 1-2元/公里
      
      # Q_kg: 实际装载质量(kg) - 载货量参数
      vehicle_payload_kg: 25000                            # 车辆实际装载质量 (kg)
                                                           # ■ 用途: 公式中的Q_kg参数，单车实际载重
                                                           # ■ 技术参数:
                                                           #   - 车辆总质量: 40-45吨
                                                           #   - 车辆自重: 15-18吨
                                                           #   - 理论载重: 25-30吨
                                                           #   - 实际载重: 20-25吨 (考虑安全系数)
                                                           # ■ 载重率: 按80%计算，考虑装载效率
      
      # 载重率调整参数 - 实际装载量与理论载重的比值
      utilization_rate: 0.8                               # 载重利用率
                                                           # ■ 用途: Q_rated * u = Q_kg，实际载重计算
                                                           # ■ 影响因素:
                                                           #   - 货物密度特性
                                                           #   - 装载安全要求  
                                                           #   - 运输路线条件
                                                           #   - 法规重量限制
  
  # -------------------------------------------------------------------------
  # 供应短缺惩罚成本 - 确保供应可靠性的约束机制
  # -------------------------------------------------------------------------
  shortage_penalty_yuan_per_kg: 2500                       # 供应短缺惩罚成本 (元/kg)
                                                           # ■ 用途：当MTJ航煤供应不足时的惩罚成本
                                                           # ■ 代码位置：目标函数中的短缺惩罚项
                                                           # ■ 设置原理：
                                                           #   - 远高于生产成本，确保优先满足需求
                                                           #   - 反映航煤短缺对航空公司的损失
                                                           # ■ 参考依据：
                                                           #   - 航空煤油市场价：6000-8000元/吨
                                                           #   - 短缺损失：包括航班取消、替代燃料溢价等
                                                           # ■ 调参建议：根据供应保障重要性调整

# =============================================================================
# 4.1 MTJ设施成本参数 (MTJ Facility Cost Parameters)
# 用于优化模型中MTJ生产工厂的投资和运营成本计算
# =============================================================================
facility_lcoe_parameters:
  # -------------------------------------------------------------------------
  # MTJ生产工厂投资和运营成本核心参数
  # -------------------------------------------------------------------------
  fixed_capex: 20000000                             # MTJ工厂固定投资成本 (元)

  
  variable_capex_per_capacity: 20000                # 变动投资成本系数 (元/(kg/hour))

  
  fixed_opex_annual: 10000000                       # 年固定运营成本 (元/年)

  
  variable_opex_per_kg: 0.3                        # 变动运营成本 (元/kg)


# =============================================================================
# 4.2 目标函数/模型系数 (Objective Coefficients)
# 优化模型目标函数中使用的核心系数和约束参数
# =============================================================================
objective_coefficients:

  # -------------------------------------------------------------------------
  # 氢气专用运输车辆技术参数 - 运输能力和约束参数（经济参数已改用分段函数计算）
  # -------------------------------------------------------------------------
  hydrogen_transport_vehicle:
    max_vehicles_per_day: 48                                 # 日最大车次 (辆次/天)
                                                              # ■ 用途：氢气运输的日运力约束
                                                              # ■ 设计基础：每小时2车次 × 24小时
                                                              # ■ 约束考虑：
                                                              #   - 道路交通安全规定
                                                              #   - 氢气运输时段限制
                                                              #   - 车辆维护保养时间
    
    vehicle_capacity_kg: 500                                 # 单车氢气载重 (kg/辆)
                                                              # ■ 用途：氢气运输车的额定载重量
                                                              # ■ 技术限制：35MPa压力下的储氢密度
                                                              # ■ 安全裕度：实际装载通常为额定容量的90-95%
                                                              # ■ 对比：70MPa系统可达800-1000kg



  # -------------------------------------------------------------------------
  # 储存设备和仓储成本参数
  # -------------------------------------------------------------------------
  storage:
    equipment_unit_cost_yuan_per_kg: 10                      # MTJ储存设备单位成本 (元/kg)
                                                              # ■ 用途：MTJ产品储罐投资估算
                                                              # ■ 代码位置：储存投资成本计算
                                                              # ■ 注意：此参数已被 unified_costs.storage.mtj_equipment_cost_yuan_per_kg 替代
                                                              # ■ 技术要求：常温常压储存，技术要求较低
                                                              # ■ 设备构成：储罐、管道、计量、安全系统
    
    hydrogen_equipment_unit_cost_yuan_per_kg: 20             # 氢气储存设备单位成本 (元/kg)
                                                              # ■ 用途：氢气储罐投资估算
                                                              # ■ 注意：此参数已被 unified_costs.storage.hydrogen_equipment_cost_yuan_per_kg 替代
                                                              # ■ 高成本原因：
                                                              #   - 高压储存需要特殊材料
                                                              #   - 防氢脆化技术要求
                                                              #   - 安全防护系统复杂
                                                              # ■ 技术选择：高压气态 vs 低温液态
    
    direct_costs:
      warehouse_rent_per_m3_hour: 0.01                       # 仓库租金 (元/m³·小时)
                                                              # ■ 用途：储存空间的时间成本
                                                              # ■ 地区差异：一线城市0.015-0.02，二三线0.005-0.01
      
      storage_density_kg_per_m3: 500                         # 储存密度 (kg/m³)
                                                              # ■ 用途：储存空间需求计算
                                                              # ■ 基准：MTJ航煤密度约775kg/m³，考虑包装和空隙
      
      handling_cost_per_kg_hour: 0.001                       # 搬运成本 (元/kg·小时)
                                                              # ■ 用途：货物装卸和仓储操作成本
                                                              # ■ 自动化程度：影响搬运成本的关键因素


  # -------------------------------------------------------------------------
  # 期末处置成本 - 项目结束时的清理成本
  # -------------------------------------------------------------------------
  final_inventory_disposal_cost_per_kg: 100                  # 期末库存处置成本 (元/kg)
                                                              # ■ 用途：优化期末库存水平，避免过度囤积
                                                              # ■ 代码位置：目标函数中的期末处置项
                                                              # ■ 成本构成：
                                                              #   - 产品贬值：50元/kg
                                                              #   - 处置费用：30元/kg
                                                              #   - 环保处理：20元/kg
                                                              # ■ 策略意义：鼓励Just-in-Time生产和供应

# 注意：MTJ生产设备成本参数已统一到facility_lcoe_parameters配置节，避免重复计算

# =============================================================================
# 5. 其他设备原始成本 (Other Equipment Raw Costs)
# =============================================================================
equipment_raw_costs:
  # 电解槽原始成本
  electrolyzer:
    capex_raw: 800000                # 元/(kg H2/hour) 投资成本 - 氢气保持kg单位
    opex_raw: 800                  # 元/(kg H2/hour)/年 运营成本 - 氢气保持kg单位
  
  # 储存设施原始成本
  storage:
    capex_raw: 1500                 # 元/kg 储存容量投资
                                   # ■ 注意：此参数已被 unified_costs.storage.facility_investment_yuan_per_kg 替代
    opex_raw: 20                   # 元/kg/年 储存运营成本
                                   # ■ 注意：此参数已被 unified_costs.storage.facility_operation_yuan_per_kg_year 替代

# =============================================================================
# 6. 基础设施成本 (Infrastructure Costs)
# =============================================================================

# =============================================================================
# 7. 技术参数配置 (Technology Parameters)
# MTJ航煤生产的不同技术路线和工艺参数
# =============================================================================
technologies:
  # -------------------------------------------------------------------------
  # 技术复杂度调整因子 - 不同技术路线的实施难度系数
  # -------------------------------------------------------------------------
  complexity_factors:
    pipeline_direct_conversion: 1.0                        # 管道直供技术复杂度
                                                            # ■ 用途：调整不同技术路线的成本和风险
                                                            # ■ 基准值：1.0表示标准复杂度
                                                            # ■ 技术特点：成熟度高，技术风险低
                                                            # ■ 实施优势：基础设施相对完善
    
    lng_terminal_conversion: 1.0                           # LNG接收站技术复杂度
                                                            # ■ 技术集成：LNG气化 + MTJ生产
                                                            # ■ 复杂度因素：需要低温储存和气化技术
    
    lng_to_hplant_conversion: 1.0                          # LNG转运+可再生能源站技术复杂度
                                                            # ■ 多技术集成：LNG运输 + 电解制氢 + MTJ生产
                                                            # ■ 协调难度：需要多个系统协调运行
    
    airport_integrated_conversion: 1.0                     # 机场集成技术复杂度
                                                            # ■ 场地限制：机场环境对安全和噪声要求高
                                                            # ■ 监管要求：需要符合民航安全标准
    
  
  # -------------------------------------------------------------------------
  # 具体技术路线配置 - E-CRM+TRM工艺的不同实施模式
  # -------------------------------------------------------------------------
  pipeline_direct_conversion:
    name: 'E-CRM+TRM MTJ航煤生产（在可再生能源站）'         # 技术路线名称
                                                            # ■ 工艺路线：E-CRM (Electric CO₂ Reduction to Methanol) + TRM (To Rocket fuel/jet fuel via Methanol)
                                                            # ■ 特点：在可再生能源站就地生产，减少运输成本
    
    efficiency: 0.85                                       # E-CRM+TRM整体转换效率 (无量纲)
                                                            # ■ 用途：天然气和氢气转换为MTJ航煤的总体效率
                                                            # ■ 代码位置：技术约束和物料平衡计算
                                                            # ■ 工艺构成：
                                                            #   - 甲烷蒸汽重整：75-80%
                                                            #   - F-T合成：70-80%  
                                                            #   - 加氢精制：90-95%
                                                            #   - 综合效率：85% (保守估计)
                                                            # ■ 技术进步：先进工艺可达90-92%
    
    ng_consumption_ratio: 0.8                              # 天然气消耗比 (m³天然气/kg航煤)
                                                            # ■ 用途：生产1kg MTJ航煤需要的天然气量
                                                            # ■ 理论基础：基于化学计量关系和工艺效率
                                                            # ■ 成本影响：天然气成本占总成本的40-50%
                                                            # ■ 优化潜力：通过工艺改进可降至0.7-0.75
    
    h2_consumption_ratio: 0.12                             # 氢气消耗比 (kg绿氢/kg航煤)
                                                            # ■ 用途：生产1kg MTJ航煤需要的绿氢量
                                                            # ■ 作用：加氢精制过程，提高产品质量
                                                            # ■ 来源：现场电解水制氢
                                                            # ■ 成本占比：绿氢成本占15-20%
    
    methanol_intermediate_ratio: 1.2                       # 甲醇中间产物比 (kg甲醇/kg航煤)
                                                            # ■ 用途：E-CRM阶段产生的甲醇中间产物量
                                                            # ■ 工艺意义：甲醇是MTJ航煤生产的关键中间体
                                                            # ■ 转换损失：甲醇到航煤转换率约83%
    
    suitable_locations: ['solar_plant', 'wind_farm']       # 适合的建设地点类型
                                                            # ■ 用途：确定该技术路线的可行建设位置
                                                            # ■ 优势：利用就地可再生能源，降低电力成本
                                                            # ■ 约束：需要充足的可再生能源供应
    
    transport_mode: 'pipeline_direct'                      # 对应的运输模式
                                                            # ■ 用途：与transport_modes配置项关联
                                                            # ■ 特点：天然气管道直供，产品公路运输
    
    hydrogen_transport_required: false                     # 是否需要氢气运输
                                                            # ■ 用途：确定是否需要计算氢气运输成本
                                                            # ■ 优势：就地制氢就地使用，无运输成本和损失
                                                            # ■ 代码位置：氢气供应约束计算
    
    technology_type: 'E-CRM+TRM'                           # 核心技术类型标识
                                                            # ■ 用途：技术分类和参数标准化
                                                            # ■ 对比：区别于传统F-T工艺或其他制备路线
  
  # -------------------------------------------------------------------------
  # 其他技术路线配置 - 相同工艺在不同场景的应用
  # 注：以下技术路线采用相同的E-CRM+TRM工艺参数，主要区别在于：
  # 1. 建设地点和适用场景不同
  # 2. 氢气供应模式不同（就地制氢 vs 外部运输）
  # 3. 天然气供应方式不同（管道 vs LNG vs 综合）
  # -------------------------------------------------------------------------
  airport_integrated_conversion:
    name: 'E-CRM+TRM MTJ航煤生产（机场集成）'              # 机场就近建设模式
    efficiency: 0.85                                       # ■ 优势：减少产品运输距离和时间
    ng_consumption_ratio: 0.8                              # ■ 约束：受机场用地和安全规定限制
    h2_consumption_ratio: 0.12
    methanol_intermediate_ratio: 1.2
    suitable_locations: ['airport']                        # ■ 专用场景：机场周边工业用地
    transport_mode: 'airport_integrated'
    hydrogen_transport_required: true                      # ■ 氢气外部供应：需要专用运输车辆
    technology_type: 'E-CRM+TRM'
  
  lng_terminal_conversion:
    name: 'E-CRM+TRM MTJ航煤生产（LNG接收站）'             # LNG接收站集成模式
    efficiency: 0.85                                       # ■ 优势：天然气供应稳定，成本可控
    ng_consumption_ratio: 0.8                              # ■ 特点：利用港口LNG基础设施
    h2_consumption_ratio: 0.12
    methanol_intermediate_ratio: 1.2
    suitable_locations: ['lng_terminal']                   # ■ 地理优势：通常位于沿海工业区
    transport_mode: 'lng_port_supply'
    hydrogen_transport_required: true                      # ■ 挑战：氢气需要从可再生能源站运输
    technology_type: 'E-CRM+TRM'
  
  lng_to_hplant_conversion:
    name: 'E-CRM+TRM MTJ航煤生产（LNG转运+可再生能源站）'    # LNG转运+绿能集成模式
    efficiency: 0.85                                       # ■ 创新模式：结合LNG灵活性和绿能优势
    ng_consumption_ratio: 0.8                              # ■ 特点：LNG卡车运输+就地绿氢
    h2_consumption_ratio: 0.12
    methanol_intermediate_ratio: 1.2
    suitable_locations: ['solar_plant', 'wind_farm']       # ■ 选址：大型可再生能源基地
    transport_mode: 'lng_transfer'
    hydrogen_transport_required: false                     # ■ 优势：就地绿氢，无运输损失
    technology_type: 'E-CRM+TRM'
  

# =============================================================================
# 8. 运输模式参数 (Transport Mode Parameters)
# 不同技术路线对应的天然气和氢气运输解决方案
# =============================================================================
transport_modes:
  # -------------------------------------------------------------------------
  # 管道直供模式 - 基于天然气管网的供应方案
  # -------------------------------------------------------------------------
  pipeline_direct:
    name: '管段直供'                                    # 运输模式名称
    description: '天然气从管道经罐车运输到可再生能源站，就地制氢制备MTJ航煤，氢气运输成本为0'
                                                        # ■ 工艺流程：天然气管网 → 罐车运输 → 可再生能源站 → MTJ生产
                                                        # ■ 核心优势：就地制氢，无氢气运输损失和成本
    
    capacity_factor: 0.95                              # 可用性因子 (无量纲)
                                                        # ■ 用途：考虑天然气管网和运输系统的可靠性
                                                        # ■ 高可靠性原因：
                                                        #   - 天然气管网供应稳定
                                                        #   - 成熟的罐车运输技术
                                                        #   - 较少的中间环节
                                                        # ■ 停机因素：管道维修(2%)、车辆保养(3%)
    
    distance_limit_km: 1500                            # 最大经济运输距离 (km) - 基于罐车运输经济性调整
                                                        # ■ 用途：确定该运输模式的适用范围
                                                        # ■ 限制因素：
                                                        #   - 罐车运输成本随距离增长
                                                        #   - 长距离运输的时效性要求
                                                        #   - 驾驶员工时法规限制
                                                        # ■ 超过限制：建议考虑LNG转运或综合供应
    
    suitable_sources: ['ng_pipeline']                  # 适用的天然气来源类型
                                                        # ■ 专用性：只适用于管道天然气供应
                                                        # ■ 基础设施要求：完善的天然气管网覆盖
    
    hydrogen_transport_cost: 0                         # 氢气运输成本 (元/kg·km)
                                                        # ■ 零成本原因：在可再生能源站就地制氢就地使用
                                                        # ■ 竞争优势：消除氢气运输的高成本和技术挑战
                                                        # ■ 代码位置：氢气运输成本计算中的重要参数
  
  # -------------------------------------------------------------------------
  # 机场集成模式 - 机场就近建设的供应解决方案
  # -------------------------------------------------------------------------
  airport_integrated:
    name: '机场集成'                                    # 机场就近建设模式
    description: '在机场就近建设生产设施，多种来源供气'
                                                        # ■ 战略价值：最大限度缩短产品运输距离
                                                        # ■ 挑战：机场用地限制和严格的安全要求
    
    cost_yuan_per_mcm_km: 5.0                          # 综合供气运输成本 (元/万m³·km)
                                                        # ■ 用途：多源供气的平均运输成本
                                                        # ■ 成本构成：管道费用、LNG运输费用的加权平均
                                                        # ■ 灵活性溢价：多源供应的额外管理和协调成本
    
    capacity_factor: 0.90                              # 系统可用性因子
                                                        # ■ 影响因素：
                                                        #   - 机场运营时段限制
                                                        #   - 民航安全检查影响
                                                        #   - 复杂供应链协调难度
                                                        # ■ 优化空间：通过智能调度可提升至92-94%
    
    distance_limit_km: 500                             # 本地化供应半径 (km)
                                                        # ■ 设计理念：本地化生产，减少长距离运输
                                                        # ■ 实际考虑：机场周边工业用地可获得性
                                                        # ■ 安全要求：符合机场净空和安全防护要求
    
    suitable_sources: ['ng_pipeline']                  # 仅支持天然气管道直供
                                                        # ■ 成本优势：无运输成本，直接管道供气
                                                        # ■ 技术简化：避免复杂的多源供应协调
  
  # -------------------------------------------------------------------------
  # LNG接收站供应模式 - 基于LNG终端的直接供应
  # -------------------------------------------------------------------------
  lng_port_supply:
    name: 'LNG接收站供应'                              # LNG接收站直供模式
    description: '从LNG接收站直接供应天然气'
                                                        # ■ 特点：利用港口LNG接收和气化基础设施
                                                        # ■ 优势：气源稳定，价格相对可控
    
    capacity_factor: 0.92                              # 系统可用性因子
                                                        # ■ 高可靠性：LNG接收站设施先进，自动化程度高
                                                        # ■ 维护影响：定期设备维护约影响8%可用时间
    
    distance_limit_km: 800                             # 经济运输半径 (km)
                                                        # ■ LNG运输：专用槽车运输距离经济性考虑
                                                        # ■ 基础设施：需要专用LNG运输和储存设备
    
    suitable_sources: ['lng_terminal']                 # 专用LNG来源
                                                        # ■ 基础设施依赖：必须有LNG接收站支撑
                                                        # ■ 地理限制：通常限于沿海地区或LNG枢纽
  
  # -------------------------------------------------------------------------
  # LNG转运模式 - 多式联运的灵活供应方案
  # -------------------------------------------------------------------------
  lng_transfer:
    name: 'LNG转运'                                    # LNG多式联运模式
    description: 'LNG接收站到生产基地的多式联运'
                                                        # ■ 创新性：结合LNG储运优势和可再生能源优势
                                                        # ■ 适用性：连接沿海LNG资源和内陆绿能基地
    
    capacity_factor: 0.85                              # 多环节系统可用性
                                                        # ■ 复杂性影响：多个转运环节增加系统复杂度
                                                        # ■ 影响因素：
                                                        #   - LNG储罐装卸时间
                                                        #   - 运输车辆调度协调
                                                        #   - 天气对运输的影响
    
    distance_limit_km: 1200                            # 长距离转运能力 (km)
                                                        # ■ 经济性：LNG密度高，适合长距离运输
                                                        # ■ 技术支撑：成熟的LNG槽车和储存技术
    
    suitable_sources: ['lng_terminal']                 # LNG专用来源
                                                        # ■ 起点要求：必须有LNG液化和装车设施
                                                        # ■ 终点要求：需要LNG储存和气化设备
  

# =============================================================================
# 9. Gurobi求解器参数 (Gurobi Solver Parameters)
# 混合整数规划优化求解器的核心配置参数
# =============================================================================
solver_parameters:
  # -------------------------------------------------------------------------
  # 求解时间和精度控制参数
  # -------------------------------------------------------------------------
  TimeLimit: 3600                                     # 最大求解时间限制 (秒)
                                                       # ■ 用途：防止复杂问题求解时间过长
                                                       # ■ 代码位置：Gurobi模型设置中的关键参数
                                                       # ■ 设置原理：
                                                       #   - 3600秒 = 1小时，适合中等规模MIP问题
                                                       #   - 超过此时间将返回当前最优解
                                                       #   - 平衡求解质量和计算时间
                                                       # ■ 调参建议：
                                                       #   - 小规模问题：600-1800秒
                                                       #   - 大规模问题：7200-14400秒
                                                       #   - 测试阶段：300-900秒
                                                       # ■ 性能影响：直接影响求解完整性和结果质量
  
  MIPGap: 0.01                                        # 混合整数规划间隙容忍度 (无量纲)
                                                       # ■ 用途：控制最优性容忍度，平衡精度和速度
                                                       # ■ 含义：0.01 = 1%，表示可接受1%的次优性
                                                       # ■ 数学定义：(上界 - 下界) / |上界| ≤ 0.01
                                                       # ■ 实际影响：
                                                       #   - 降低gap值：提高解的质量，但增加计算时间
                                                       #   - 提高gap值：加快求解速度，但可能得到次优解
                                                       # ■ 行业标准：
                                                       #   - 商业决策：0.1-1% (当前设置)
                                                       #   - 学术研究：0.01-0.1%
                                                       #   - 工程应用：1-5%
                                                       # ■ 调参策略：
                                                       #   - 初期测试：0.05-0.1 (5-10%)
                                                       #   - 生产环境：0.01-0.02 (1-2%)
                                                       #   - 高精度需求：0.001-0.005 (0.1-0.5%)
  
  Threads: 128                                         # 并行计算线程数 (整数)
                                                       # ■ 用途：控制Gurobi使用的CPU核心数量
                                                       # ■ 代码位置：求解器并行计算配置
                                                       # ■ 设置考虑：
                                                       #   - 128线程适合高性能服务器
                                                       #   - 充分利用多核CPU资源
                                                       #   - 显著加速大规模MIP问题求解
                                                       # ■ 硬件匹配：
                                                       #   - 个人电脑：4-16线程
                                                       #   - 工作站：16-64线程  
                                                       #   - 服务器：64-256线程 (当前设置适合高端服务器)
                                                       # ■ 性能优化：
                                                       #   - 线程数不是越多越好
                                                       #   - 存在内存带宽瓶颈
                                                       #   - 建议设置为物理核心数的1-2倍
                                                       # ■ 动态调整：
                                                       #   - 小问题：使用较少线程避免开销
                                                       #   - 大问题：使用更多线程加速求解
                                                       # ■ 监控指标：求解器并行效率和内存使用情况

# =============================================================================
# 10. 运营参数 (Operational Parameters)  
# 系统实际运营中的关键效率和默认配置参数
# =============================================================================
operational_parameters:
  # -------------------------------------------------------------------------
  # 系统操作效率参数 - 反映真实运营环境的效率损失
  # -------------------------------------------------------------------------
  operational_efficiency: 0.90                           # 综合操作效率 (无量纲)
                                                          # ■ 用途：调整理论产能到实际产能的系数
                                                          # ■ 代码位置：产能约束和成本计算中的效率折算
                                                          # ■ 影响因素：
                                                          #   - 设备维护保养：影响5-8%
                                                          #   - 天气条件影响：影响1-3%
                                                          #   - 操作人员技能：影响2-4%
                                                          #   - 原料质量波动：影响1-2%
                                                          # ■ 行业对比：
                                                          #   - 石化行业：85-92%
                                                          #   - 新兴技术：80-90% (当前设置)
                                                          #   - 成熟工艺：90-95%
                                                          # ■ 提升路径：
                                                          #   - 数字化监控：可提升2-3%
                                                          #   - 预测性维护：可提升1-2%
                                                          #   - 操作培训：可提升1-2%
  
  # -------------------------------------------------------------------------
  # 默认运输距离配置 - 缺少实际距离数据时的后备参数
  # -------------------------------------------------------------------------
  default_transport_distances:
    hydrogen_transport_distance_km: 50                    # 氢气运输默认距离 (km)
                                                          # ■ 用途：当GraphHopper路由失败时的默认值
                                                          # ■ 设置依据：
                                                          #   - 氢气运输安全半径一般≤100km
                                                          #   - 50km属于安全经济范围
                                                          #   - 符合城市群内部运输距离
                                                          # ■ 现实参考：
                                                          #   - 城市内运输：20-30km
                                                          #   - 城际运输：50-100km
                                                          #   - 跨区域运输：100-300km
                                                          # ■ 成本影响：50km约增加运输成本15-25%
    
    ng_transport_distance_km: 80                          # 天然气运输默认距离 (km)
                                                          # ■ 用途：天然气罐车运输的标准设定距离
                                                          # ■ 经济性考虑：80km是罐车运输的经济节点
                                                          # ■ 技术参考：
                                                          #   - 罐车单次行程最佳距离：60-120km
                                                          #   - 考虑装卸时间和效率
                                                          #   - 司机工时法规限制
                                                          # ■ 替代方案：超过150km建议考虑管道或LNG
  
  # 注意：设施投资参数已统一到facility_lcoe_parameters配置节，避免重复定义

# =============================================================================
# 11. 运输聚类参数 (Transport Clustering Parameters)
# 基于DBSCAN算法的可再生能源发电厂地理聚类配置
# =============================================================================
clustering_parameters:
  # -------------------------------------------------------------------------
  # DBSCAN聚类算法核心参数
  # -------------------------------------------------------------------------
  enable_clustering: true                                      # 是否启用运输聚类功能
                                                               # ■ 用途：控制是否使用聚类优化运输路径
                                                               # ■ 影响：启用后将自动对可再生能源发电厂进行地理聚类
                                                               # ■ 效果：减少运输基础设施成本，实现分层运输策略

  eps_distance_km: 60.0                                        # DBSCAN距离阈值 (公里)
                                                               # ■ 用途：定义两个发电厂被认为"邻近"的最大距离
                                                               # ■ 设置原理：
                                                               #   - 60km是短距离集中运输的经济范围
                                                               #   - 超过60km的点不会被聚合到同一集中点
                                                               # ■ 参数调优：
                                                               #   - 30-50km：适合大多数实际场景
                                                               #   - <30km：适合密集分布区域（城市周边）
                                                               #   - >50km：适合稀疏分布区域（西部地区）
                                                               # ■ 经济考虑：基于运输成本vs基础设施建设成本的平衡点

  min_samples: 2                                               # 形成聚类的最小发电厂数量
                                                               # ■ 用途：决定最少多少个发电厂才能形成一个聚类
                                                               # ■ 设置为2的原因：
                                                               #   - 最大化聚类覆盖率，减少独立发电厂数量
                                                               #   - 适合发电厂分布相对稀疏的中国实际情况
                                                               #   - 任意两个足够近的发电厂都有集中运输的价值
                                                               # ■ 替代方案：
                                                               #   - min_samples=3：更保守，确保集中点有足够规模

  shared_pipeline_discount_factor: 0.65                        # Layer2共享管道成本折扣系数
                                                               # ■ 用途：体现聚类中心到目的地共享管道的规模经济优势
                                                               # ■ 经济学原理：
                                                               #   - 多个发电厂汇聚后共用同一管道基础设施
                                                               #   - 规模效应降低单位运输成本
                                                               #   - 减少管道重复建设投资
                                                               # ■ 设置说明：
                                                               #   - 0.65 = 35%的成本优势（推荐值）
                                                               #   - 0.5-0.7：合理范围，体现30-50%的共享优势
                                                               #   - 1.0：无折扣，等同于独立管道
                                                               # ■ 影响：
                                                               #   - 激励优化器选择聚类方案而非直连
                                                               #   - Layer2管道成本 = 原成本 × 折扣系数
                                                               # ■ 调参建议：
                                                               #   - 0.6-0.7：适度激励聚类（推荐）
                                                               #   - 0.5：强激励聚类（激进）
                                                               #   - 0.8：轻度激励聚类（保守）
                                                               #   - min_samples=4：严格模式，只有密集区域才聚类
                                                               # ■ 业务含义：降低门槛，提高基础设施利用效率

  processing_cost_base: 10.0                                   # 集中点处理基础成本 (元/kg)
                                                               # ■ 用途：集中点对氢气进行中转处理的单位成本
                                                               # ■ 成本构成：
                                                               #   - 临时储存费用：~3元/kg
                                                               #   - 转运装卸费用：~4元/kg
                                                               #   - 设备折旧和运维：~2元/kg
                                                               #   - 人工和管理费用：~1元/kg
                                                               # ■ 成本特性：与运输量成正比，无固定成本
                                                               # ■ 优化效果：通过集中处理降低总体运输成本

  # -------------------------------------------------------------------------
  # 管道距离优化配置
  # -------------------------------------------------------------------------
  enable_pipeline_optimization: true                          # 是否启用管道距离优化
                                                               # ■ 用途：优化聚类中心位置时考虑到最近管道的距离
                                                               # ■ 优化目标：在地理中心和管道接近性之间找平衡
                                                               # ■ 实现方式：使用HydrogenPipelineDistanceCalculator
                                                               # ■ 效果：可减少5-15%的最终运输距离

  pipeline_weight: 0.3                                        # 管道距离在优化中的权重 (0-1)
                                                               # ■ 用途：平衡地理中心性和管道接近性的重要性
                                                               # ■ 权重说明：
                                                               #   - 0.0：完全忽略管道，纯地理中心
                                                               #   - 0.3：适度考虑管道距离（推荐值）
                                                               #   - 0.5：地理中心与管道距离等重要
                                                               #   - 1.0：完全偏向管道，可能偏离发电厂
                                                               # ■ 实际效果：避免集中点建在距离管道过远的位置

  # -------------------------------------------------------------------------
  # 聚类结果处理配置
  # -------------------------------------------------------------------------
  noise_plant_handling: "direct_connection"                   # 噪声点（独立发电厂）处理方式
                                                               # ■ 选项：
                                                               #   - "direct_connection": 直接连接到管道网络
                                                               #   - "merge_to_nearest": 合并到最近的聚类中心
                                                               # ■ 推荐：direct_connection（保持独立性）

  max_clusters: 50                                             # 最大允许聚类数量限制
                                                               # ■ 用途：防止过度聚类，控制基础设施建设数量
                                                               # ■ 实际意义：全国范围内建设50个集中点是合理的
                                                               # ■ 超限处理：优先保留规模大的聚类

  # -------------------------------------------------------------------------
  # 调试和输出配置
  # -------------------------------------------------------------------------
  export_clustering_results: true                             # 是否导出聚类结果到文件
  clustering_output_path: "clustering_results.json"           # 聚类结果输出文件路径
  enable_clustering_visualization: false                       # 是否生成聚类可视化图表
                                                               # ■ 注意：需要matplotlib和相关依赖

