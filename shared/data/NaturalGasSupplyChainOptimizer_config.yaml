# =============================================================================
# 15. 氢能管道运输成本配置 (Hydrogen Pipeline Transport Costs)
# =============================================================================
costs:
  hydrogen_pipeline_costs:
    # 管道建设投资成本参数
    capex_yuan_per_km: 5000000                         # 氢能管道建设成本(元/km)
                                                       # ■ 用途：管道投资成本计算
                                                       # ■ 基于：氢能管道工程实际造价
                                                       # ■ 包含：管材、施工、压缩机站、安全系统
                                                       # ■ 地形系数：平原1.0，丘陵1.3，山地1.5
    
    # 运输成本函数参数 (分段线性插值)
    transport_cost_function:
      function_type: "piecewise_linear"               # 成本函数类型：分段线性插值
      description: "基于图表33管道输送氢气成本曲线"       # 数据来源说明
      data_points: [                                   # 数据点 [距离km, 成本元/(kg氢气·百公里)]
        [25, 1.91],   # 25km: 1.91元/(kg氢气·百公里)
        [50, 1.04],   # 50km: 1.04元/(kg氢气·百公里)
        [100, 0.56],  # 100km: 0.56元/(kg氢气·百公里)
        [200, 0.30],  # 200km: 0.30元/(kg氢气·百公里)
        [300, 0.21],  # 300km: 0.21元/(kg氢气·百公里)
        [400, 0.16],  # 400km: 0.16元/(kg氢气·百公里)
        [500, 0.13]   # 500km: 0.13元/(kg氢气·百公里)
      ]
      unit: "yuan_per_kg_hydrogen_per_100km"          # 成本单位：元/(kg氢气·百公里)
      notes: |
        成本函数已包含以下所有费用：
        - 管道建设投资摊销
        - 压缩机站投资和运营
        - 管道维护和检测
        - 能耗成本（压缩机电力）
        - 人工和管理成本
        
        单位转换说明：
        - 配置单位：元/(kg氢气·百公里)
        - 计算公式：总成本 = 单位成本 × (运输距离km ÷ 100)
        - 最终单位：元/kg氢气
        - 与罐车运输单位保持一致

# =============================================================================
# 16. 统一成本配置 (Unified Cost Configuration)
# =============================================================================
unified_costs:
  # -------------------------------------------------------------------------
  # 原料采购成本 - 统一管理所有原料的市场采购价格
  # -------------------------------------------------------------------------
  raw_materials:
    natural_gas_base_price_yuan_per_m3: 4.2         # 天然气基础采购价格 (元/m³)
                                                     # ■ 用途：统一的天然气市场价格基准
                                                     # ■ 代码位置：天然气成本计算的基础价格
