metadata:
  version: 4.0.0
  author: 系统自动生成
  created_date: '2025-10-13'
  last_updated: '2025-10-13'
  description: DAC直接空气捕获+绿氢制SAF供应链优化
  notes: "配置文件说明:\n- 此配置文件包含了GreenHydrogenSupplyChainOptimizer类的所有参数配置\n- 修改此文件可以调整优化器的行为，无需修改源代码\n\
    - 参数分为15个主要类别，涵盖了经济、技术、成本、数据路径等各个方面\n- v2.0.0更新:\n  * 从天然气路线迁移到绿氢路线\n  * 添加CO₂捕获源参数配置\n\
    \  * 移除天然气相关配置（LNG接收站、天然气管道等）\n  * 更新技术路线为绿氢+CO₂→SAF\n\n主要配置类别:\n1. basic_parameters:\
    \ 基础系统参数（时间范围、路径规划）\n2. capacity_limits: 容量限制（设施产能、运输能力）\n3. co2_capture_parameters:\
    \ CO₂捕获源参数（NEW）\n4. carbon_emission_parameters: 碳排放参数（全生命周期评估）\n5. clustering_parameters:\
    \ 聚类参数（DBSCAN地理聚类）\n6. cost_parameters: 成本参数（氢气价格、运输成本）\n7. costs: 详细成本数据\n8.\
    \ data_paths: 数据路径配置（输入输出文件路径）\n9. dependencies: 依赖关系说明（模块、库、数据依赖）\n10. economic_parameters:\
    \ 经济参数（LCOE计算、贴现率）\n11. equipment_raw_costs: 设备原始成本（CAPEX/OPEX）\n12. facility_lcoe_parameters:\
    \ 设施平准化成本参数\n13. geographic_data: 地理数据（机场坐标）\n14. objective_coefficients: 目标函数系数\n\
    15. operational_parameters: 运营参数\n16. solver_parameters: Gurobi求解器参数\n17. technologies:\
    \ 技术路线参数（绿氢+CO₂→SAF）\n18. transport_modes: 运输模式配置\n"
  co2_source: direct_air_capture
  base_version: 2.0.0
objective_coefficients:
  final_inventory_disposal_cost_per_kg: 100
  storage:
    direct_costs:
      handling_cost_per_kg_hour: 0.001
      storage_density_kg_per_m3: 500
      warehouse_rent_per_m3_hour: 0.01
    equipment_unit_cost_yuan_per_kg: 10
operational_parameters:
  default_transport_distances:
    h2_transport_distance_km: 100
    co2_transport_distance_km: 80
  operational_efficiency: 0.9
solver_parameters:
  TimeLimit: 1.0e100
  MIPGap: 0.03
  Threads: 192
technologies:
  green_h2_co2_to_saf:
    name: 绿氢+CO₂费托合成制SAF
    technology_type: GreenH2_CO2_FT
    transport_mode: renewable_h2_pipeline
    process_mode: one_step
    suitable_locations:
    - solar_plant
    - wind_farm
    - airport
    - byproduct_hydrogen_steel
    - byproduct_hydrogen_refinery
    efficiency: 0.6
    h2_consumption_ratio: 0.45
    co2_consumption_ratio: 3.2
    co2_emission_factor: -2.5
    reactor_temperature_celsius: 250
    reactor_pressure_mpa: 3.0
    catalyst_type: Iron-based
    catalyst_cost_yuan_per_kg_saf: 0.12
    energy_consumption_kwh_per_kg_saf: 7.6
    heat_integration_efficiency: 0.7
    hydrogen_transport_required: true
  complexity_factors:
    green_h2_co2_to_saf: 1.2
transport_constraints:
  h2_truck_transport:
    max_trucks_per_day: 15
    truck_capacity_kg: 500
  co2_truck_transport:
    max_trucks_per_day: 25
    truck_capacity_ton: 20
transport_modes:
  renewable_h2_pipeline:
    capacity_factor: 0.92
    description: 可再生能源发电厂电解制氢，管道输送至SAF设施
    distance_limit_km: 500
    name: 可再生能源氢气管道
    suitable_sources:
    - renewable_plant
  co2_pipeline_transport:
    capacity_factor: 0.95
