metadata:
  version: 3.0.0
  author: 系统自动生成
  created_date: '2025-10-27'
  last_updated: '2025-10-27'
  description: 'CoalHydrogenSAFOptimizer综合参数配置文件

    Coal Hydrogen SAF Supply Chain Optimizer Comprehensive Configuration File

    '
  notes: "配置文件说明:\n- 此配置文件包含了CoalHydrogenSAFOptimizer类的所有参数配置\n- 修改此文件可以调整优化器的行为，无需修改源代码\n\
    - 参数分为15个主要类别，涵盖了经济、技术、成本、数据路径等各个方面\n- v2.0.0更新:\n  * 从绿氢+外部CO₂捕获路线迁移到煤炭气化+绿氢路线\n\
    \  * 添加煤炭供应参数配置(coal_parameters)\n  * 移除CO₂外部捕获和运输配置（CO₂聚类、管道运输等）\n  * 更新技术路线为煤炭气化CO₂+绿氢→SAF\n\
    - v3.0.0更新（2025-10-28）:\n  * 修正甲醇转化比例: methanol_intermediate_ratio 从 3.125 改为\
    \ 1.5625\n  * 统一电解制氢能耗: 所有位置统一为 55 kWh/kg H₂\n  * 修正SAF反应器最小经济规模: 从 0 改为 100 kg/h\n\
    \  * 修正储存设施成本: CAPEX从2000改为200000元, OPEX从30改为5000元/年\n  * 修正平准化成本阈值: 从 1000 改为\
    \ 50 元/kg\n  * 优化求解器线程数: 从 128 改为 0 (自动检测)\n  * 删除煤炭消耗参数重复定义，统一使用 coal_parameters.coal_consumption_kg_per_kg_saf\n\
    \  * 添加煤炭气化能耗kWh单位，方便代码使用\n- v3.1.0更新（2025-11-10）:\n  * ✅ 确认使用一步法: 煤制合成气+H₂→SAF（无甲醇中间变量）\n\
    \  * ✅ 修正SAF合成段能耗: energy_consumption_kwh_per_kg_saf 从7.6改为4.0 kWh/kg\n  * ✅ 删除两步法遗留参数（methanol_intermediate_ratio,\
    \ methanol_to_saf_ratio）\n  * ⚠️ 待修复: 代码中仍实现两步法，需要移除甲醇相关变量和约束\n\n主要配置类别:\n1. basic_parameters:\
    \ 基础系统参数（时间范围、路径规划）\n2. capacity_limits: 容量限制（设施产能、运输能力）\n3. co2_capture_parameters:\
    \ CO₂捕获源参数（NEW）\n4. carbon_emission_parameters: 碳排放参数（全生命周期评估）\n5. clustering_parameters:\
    \ 聚类参数（DBSCAN地理聚类）\n6. cost_parameters: 成本参数（氢气价格、运输成本）\n7. costs: 详细成本数据\n8.\
    \ data_paths: 数据路径配置（输入输出文件路径）\n9. dependencies: 依赖关系说明（模块、库、数据依赖）\n10. economic_parameters:\
    \ 经济参数（LCOE计算、贴现率）\n11. equipment_raw_costs: 设备原始成本（CAPEX/OPEX）\n12. facility_lcoe_parameters:\
