capacity_limits:
  big_m_constant: 10000
  saf_reactor_max_capacity_kg_per_hour: 1000000
  saf_reactor_min_capacity_kg_per_hour: 0.01
  saf_capacity_estimates:
    default: 2000
    industrial: 3000
    petrochemical_base: 5000
  electrolyzer_max_capacity_kg_per_hour: 100000
  electrolyzer_min_capacity_kg_per_hour: 100
  hydrogen_pipeline_max_daily_capacity_kg: 500000
co2_parameters:
  capture_sources:
    coal_power_capture_rate: 0.85
    coal_power_emission_factor: 0.95
    coal_power_capacity_factor: 0.7
    lng_power_capture_rate: 0.9
    lng_power_emission_factor: 0.42
    lng_power_capacity_factor: 0.75
    oil_refinery_capture_rate: 0.8
    oil_refinery_emission_factor: 0.6
    oil_refinery_capacity_factor: 0.85
  capture_costs:
    coal_power_yuan_per_ton: 150
    lng_power_yuan_per_ton: 180
    oil_refinery_yuan_per_ton: 120
  transport:
    pipeline_transport_cost_function:
      function_type: piecewise_linear
      unit: yuan_per_ton_co2_per_100km
      description: 'CO₂管道运输成本曲线（包含建设成本摊销）

        CO₂ pipeline transport cost curve (including construction cost amortization)

        模仿氢气管道成本结构，基于实际工程数据

        '
      data_points:
      - - 25
        - 12.0
      - - 50
        - 8.5
      - - 100
        - 5.0
      - - 200
        - 3.0
      - - 300
        - 2.2
      - - 400
        - 1.8
      - - 500
        - 1.5
      notes: "⚠️ 重要说明 Important Notes:\n- 成本函数已包含以下所有费用（与氢气管道成本处理方式一致）:\n  * 管道建设投资摊销\
        \ (Pipeline construction amortization)\n  * 压缩机站投资和运营 (Compressor station\
        \ CAPEX & OPEX)\n  * 管道维护和检测 (Pipeline maintenance & inspection)\n  * 能耗成本\
        \ (Energy cost for compression)\n  * 人工和管理成本 (Labor & management)\n\n- 管道建设成本（pipeline_capex_yuan_per_km）已摊销到分段线性成本函数中\n\
        - 目标函数中不需要单独添加管道建设成本项\n- 当SAF工厂位置 = CO₂捕获源位置时，运输距离 = 0，运输成本 = 0（本地供应）\n\n\
        单位转换说明 Unit Conversion:\n- 配置单位：元/(吨CO₂·百公里) yuan/(ton CO₂·100km)\n- 计算公式：总成本\
        \ = 单位成本 × (运输距离km ÷ 100) Total cost = unit cost × (distance_km ÷ 100)\n-\
        \ 最终单位：元/吨CO₂ yuan/ton CO₂\n"
    truck_cost_yuan_per_ton_per_100km: 50
    liquefaction_cost_yuan_per_ton: 80
    max_pipeline_capacity_ton_per_day: 5000
    max_truck_capacity_ton_per_day: 500
  storage:
    storage_cost_yuan_per_ton_per_day: 0.5
    max_storage_capacity_ton: 50000
    storage_density_ton_per_m3: 0.8
